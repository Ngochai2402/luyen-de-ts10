        <div class="bai-item-label">Bài ${b.bai_so}</div>
        <div class="bai-item-meta">${b.diem}đ · ${b.chu_de.split(' - ')[0]}</div>
      </div>
    </div>
  `).join('');

  // Cập nhật header cột trái
  document.getElementById('curDeNum').textContent = currentDe;
  document.getElementById('curDeLabel').textContent = `Đề Số ${currentDe}`;
  const totalDiem = CURRENT_DE_DATA.bai.reduce((s, b) => s + b.diem, 0);
  document.getElementById('curDeMeta').textContent = `${CURRENT_DE_DATA.bai.length} bài · ${totalDiem}đ`;
}

function renderMainContent() {
  const de = CURRENT_DE_DATA;
  const bai = de.bai.find(b => b.bai_so === currentBai);

  const html = `
    <div class="de-header-card">
      <span class="de-chip">Đề Số ${de.de_so} · Cụm ${de.cum}</span>
      <h2>Bài ${bai.bai_so}: ${bai.chu_de}</h2>
      <p>${de.nguon} · ${de.nam_hoc}</p>
    </div>

    <div class="de-bai-block">
      <div class="de-bai-header">
        <div class="de-bai-header-left">
          <h3>Đề bài</h3>
          <span class="de-bai-diem">${bai.diem} điểm</span>
        </div>
      </div>
      <div class="de-bai-content">${renderMarkdown(bai.de_bai)}</div>
      ${bai.hinh_anh ? `
        <div class="figure-wrap">
          <img src="${bai.hinh_anh}" alt="${bai.ghi_chu_hinh || 'Hình bài ' + bai.bai_so}" class="figure-img" onclick="this.classList.toggle('zoomed')" title="Bấm để phóng to/thu nhỏ" />
          ${bai.ghi_chu_hinh ? `<div class="figure-caption">${bai.ghi_chu_hinh} · Bấm ảnh để phóng to</div>` : ''}
        </div>
      ` : (bai.co_hinh_ve ? `
        <div class="figure-note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Bài có hình vẽ: <em>${bai.ghi_chu_hinh}</em></span>
        </div>
      ` : '')}
    </div>

    <div class="conversation-section">
      <div class="conv-title">💬 Hội thoại với TRỢ LÝ THẦY HẢI</div>
      <div class="conversation" id="conversation">${renderConversation()}</div>
    </div>
  `;
  document.getElementById('deContent').innerHTML = html;
  renderKatex(document.getElementById('deContent'));
}

function renderCauDanPanel() {
  const el = document.getElementById('cauDanWrap');
  el.innerHTML = CAU_DAN_GROUPS.map(g => {
    const items = getCauDanItems(g.id);
    const isOpen = openGroups.has(g.id);
    return `
      <div class="group-block ${isOpen ? 'open' : ''}" id="group-${g.id}">
        <div class="group-header" onclick="toggleGroup('${g.id}')">
          <span class="group-icon">${g.icon}</span>
          <span class="group-title-text">${g.title}</span>
          <span class="group-chev">▶</span>
        </div>
        <div class="group-body">
          ${items.length === 0
            ? `<div style="padding: 8px 12px; font-size: 12px; color: var(--ink-muted); font-style: italic;">Bài này chưa có câu dẫn.</div>`
            : items.map((item, idx) => `
              <button class="cau-dan-item" onclick="askCauDan('${g.id}', ${idx})">${item}</button>
            `).join('')
          }
        </div>
      </div>
    `;
  }).join('');
  // Render LaTeX trong các nút câu dẫn
  renderKatex(el);
}

function renderConversation() {
  if (chatHistory.length === 0) {
    return `
      <div class="empty-conversation">
        <span class="emoji">📘</span>
        <h4>Sẵn sàng học bài!</h4>
        <p>Chọn câu hỏi bên phải hoặc gõ tự do để bắt đầu.</p>
      </div>
    `;
  }
  return chatHistory.map(m => {
    if (m.role === 'system') {
      return `<div class="bubble system">${escapeHtml(m.content)}</div>`;
    } else if (m.role === 'user') {
      const img = m.imageDataUrl ? `<img class="bubble-image" src="${m.imageDataUrl}" alt="Ảnh học sinh gửi">` : '';
      return `<div class="bubble user">${img}${escapeHtml(m.content || '')}</div>`;
    } else {
      return `<div class="bubble ai">
        <div class="ai-label">Trợ Lý Thầy Hải</div>
        ${renderMarkdown(m.content)}
      </div>`;
    }
  }).join('');
}

function renderKatex(targetElement) {
  if (!window.renderMathInElement) return;
  const target = targetElement || document.body;
  renderMathInElement(target, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false,
    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
  });
}

function updateConversationOnly() {
  const el = document.getElementById('conversation');
  if (!el) return;
  el.innerHTML = renderConversation();
  renderKatex(el);
  // Scroll đến bubble mới nhất
  setTimeout(() => {
    const last = el.querySelector('.bubble:last-child');
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

// ============ LOGIC ============
// Cache các đề đã load, tránh fetch lại
const DE_CACHE = { 1: DE_1_DATA };  // đề 1 đã nhúng sẵn
// Biến đề hiện tại (alias cho code hiện hành)
let CURRENT_DE_DATA = DE_1_DATA;

async function selectDe(n) {
  closeDeDrawer();

  // Nếu chưa có trong cache → fetch từ server
  if (!DE_CACHE[n]) {
    // Hiển thị loading state
    document.getElementById('deContent').innerHTML = `
      <div style="padding: 40px; text-align: center; color: var(--ink-muted);">
        <div style="font-size: 40px; margin-bottom: 12px;">⏳</div>
        <div style="font-size: 15px;">Đang tải Đề ${n}...</div>
      </div>
    `;
    try {
      const res = await fetch(`/api/de/${n}`, { cache: 'no-cache' });
      console.log(`[selectDe] Đề ${n} → HTTP ${res.status}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      console.log(`[selectDe] Đề ${n} → nhận được ${text.length} ký tự`);
      if (!text || text.length < 100) {
        throw new Error(`Response rỗng hoặc quá ngắn: ${text}`);
      }
      DE_CACHE[n] = JSON.parse(text);
    } catch (e) {
      console.error(`[selectDe] Đề ${n} lỗi:`, e);
      document.getElementById('deContent').innerHTML = `
        <div style="padding: 40px; text-align: center; color: var(--amber);">
          <div style="font-size: 40px; margin-bottom: 12px;">🚧</div>
          <div style="font-size: 15px;">Đề ${n} chưa có sẵn.</div>
          <div style="font-size: 13px; margin-top: 6px; color: var(--ink-muted);">Vui lòng chọn đề khác hoặc quay lại sau.</div>
          <div style="font-size: 11px; margin-top: 10px; color: var(--ink-muted); font-family: monospace;">Lỗi: ${e.message}</div>
        </div>
      `;
      // Không đổi currentDe, để user thấy state rỗng rồi chọn lại
      return;
    }
  }

  currentDe = n;
  currentBai = 1;
  openGroups.clear();
  chatHistory = [];
  CURRENT_DE_DATA = DE_CACHE[n];

  renderDeDrawer();
  renderBaiList();
  renderMainContent();
  renderCauDanPanel();
}

function selectBai(n) {
  currentBai = n;
  chatHistory = [];
  renderBaiList();
  renderMainContent();
  renderCauDanPanel();
  // Cuộn cột giữa lên đầu
  document.getElementById('colCenter').scrollTop = 0;
  // Đóng drawer mobile để thấy nội dung
  closeAllMobileDrawers();
}

function toggleGroup(id) {
  if (openGroups.has(id)) {
    openGroups.delete(id);
    document.getElementById(`group-${id}`).classList.remove('open');
  } else {
    openGroups.add(id);
    document.getElementById(`group-${id}`).classList.add('open');
  }
}

function askCauDan(groupId, idx) {
  const bai = CURRENT_DE_DATA.bai.find(b => b.bai_so === currentBai);
  const items = getCauDanItems(groupId);
  const cauDan = items[idx];
  if (!cauDan) return;

  // Lời giải - trả về từ JSON trực tiếp
  if (groupId === 'loi-giai') {
    chatHistory.push({ role: 'user', content: cauDan });
    let content = '';
    if (idx === 0) content = `**Gợi ý cấp 1 cho Bài ${bai.bai_so}:**\n\n${bai.goi_y_cap_1}`;
    else if (idx === 1) content = `**Gợi ý cấp 2 cho Bài ${bai.bai_so}:**\n\n${bai.goi_y_cap_2}`;
    else content = `**Lời giải đầy đủ cho Bài ${bai.bai_so}:**\n\n${bai.loi_giai_day_du}\n\n---\n\n**Đáp số:** ${bai.dap_so}`;
    chatHistory.push({ role: 'assistant', content });
    updateConversationOnly();
    return;
  }

  sendToAI(cauDan);
}

async function sendToAI(userMsg, imagePayload = null) {
  chatHistory.push({
    role: 'user',
    content: userMsg || (imagePayload ? 'Em gửi ảnh bài làm, thầy xem giúp em nhé.' : ''),
    imageDataUrl: imagePayload?.dataUrl || null
  });
  chatHistory.push({ role: 'assistant', content: '_Thầy đang suy nghĩ..._', _typing: true });
  updateConversationOnly();

  try {
    const useRealAPI = window.location.protocol !== 'file:';
    let response;
    if (useRealAPI) {
      const historyForAPI = chatHistory
        .slice(0, -2)
        .filter(m => !m._typing)
        .map(m => ({ role: m.role, content: m.content }));

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          de_so: currentDe,
          bai_so: currentBai,
          history: historyForAPI,
          user_message: userMsg || (imagePayload ? 'Em gửi ảnh bài làm, thầy xem giúp em nhé.' : ''),
          image: imagePayload ? {
            mime_type: imagePayload.mime_type,
            data: imagePayload.base64
          } : null
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      response = data.response;
    } else {
      response = 'Mở trang qua server để dùng AI thật. Mở qua file:// chỉ là demo tĩnh.';
    }
    chatHistory.pop();
    chatHistory.push({ role: 'assistant', content: response });
    updateConversationOnly();
  } catch (e) {
    chatHistory.pop();
    chatHistory.push({
      role: 'system',
      content: 'Không kết nối được TRỢ LÝ THẦY HẢI: ' + e.message
    });
    updateConversationOnly();
  }
}

// ============ UTILS ============
function normalizeMathSymbols(text = '') {
  return String(text)
    .replace(/\\Leftrightarrow/g, '')
    .replace(/\\Longleftrightarrow/g, '')
    .replace(/⇔|⟺|<=>/g, '')
    .replace(/\\Rightarrow/g, '\\text{suy ra }')
    .replace(/\\Longrightarrow/g, '\\text{suy ra }')
    .replace(/⇒|=>/g, 'suy ra');
}
function renderMarkdown(text) {
  const safeText = normalizeMathSymbols(text);
  if (window.marked) return marked.parse(safeText);
  return safeText.replace(/\n/g, '<br>');
}
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Input handlers
function resetSelectedImage() {
  selectedImage = null;
  document.getElementById('imageInput').value = '';
  document.getElementById('imagePreview').classList.remove('show');
  document.getElementById('previewImg').removeAttribute('src');
}
function compressImageFile(file, maxSide = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Không đọc được ảnh.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Ảnh không hợp lệ.'));
      img.onload = () => {
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * scale));
        canvas.height = Math.max(1, Math.round(img.height * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
        const dataUrl = canvas.toDataURL(mime, mime === 'image/png' ? undefined : quality);
        const base64 = dataUrl.split(',')[1];
        resolve({ dataUrl, base64, mime_type: mime, name: file.name });
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
document.getElementById('btnAttach').onclick = () => document.getElementById('imageInput').click();
document.getElementById('btnRemoveImage').onclick = resetSelectedImage;
document.getElementById('imageInput').addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
    alert('Chỉ nhận ảnh JPG, PNG hoặc WebP.');
    resetSelectedImage();
    return;
  }
  if (file.size > 10 * 1024 * 1024) {
    alert('Ảnh hơi lớn. Thầy chọn ảnh dưới 10MB nhé.');
    resetSelectedImage();
    return;
  }
  try {
    selectedImage = await compressImageFile(file);
    document.getElementById('previewImg').src = selectedImage.dataUrl;
    document.getElementById('previewName').textContent = selectedImage.name;
    document.getElementById('imagePreview').classList.add('show');
  } catch (err) {
    alert(err.message);
    resetSelectedImage();
  }
});
document.getElementById('btnSend').onclick = () => {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg && !selectedImage) return;
  const imagePayload = selectedImage;
  input.value = '';
  input.style.height = 'auto';
  resetSelectedImage();
  sendToAI(msg, imagePayload);
};
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('btnSend').click();
  }
});
document.getElementById('chatInput').addEventListener('input', (e) => {
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
});

document.getElementById('mobileChatFab').onclick = () => {
  closeAllMobileDrawers();
  document.getElementById('colRight').classList.add('mobile-show');
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('chatInput')?.focus(), 80);
};

// ============ INIT ============
window.addEventListener('load', () => {
  renderDeDrawer();
  renderBaiList();
  renderMainContent();
  renderCauDanPanel();
});
</script>
