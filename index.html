<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Đề TS10 · Trung Tâm Hưng Phương</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --ink: #1a1614;
    --ink-soft: #4a423c;
    --ink-muted: #7a6f66;
    --paper: #faf6ef;
    --paper-soft: #f3ece0;
    --paper-deep: #e8dfcf;
    --accent: #8b1538;
    --accent-soft: #b84362;
    --accent-pale: #fce8ef;
    --gold: #c08a2b;
    --amber: #a85a00;
    --line: #d9ccb4;
    --line-soft: #ebe2d0;
    --shadow-sm: 0 1px 3px rgba(74, 66, 60, 0.08);
    --shadow-md: 0 4px 12px rgba(74, 66, 60, 0.12);
    --header-h: 58px;
    --sidebar-l: 180px;
    --sidebar-r: 300px;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.65;
  }
  h1, h2, h3, h4 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; letter-spacing: -0.01em; }

  /* ======= HEADER ======= */
  .app-header {
    background: linear-gradient(135deg, #fff 0%, var(--paper-soft) 100%);
    border-bottom: 1px solid var(--line);
    padding: 10px 18px;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    display: grid;
    place-items: center;
    color: white;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 19px;
    box-shadow: 0 2px 8px rgba(139, 21, 56, 0.25);
  }
  .brand-text h1 { font-size: 19px; margin: 0; line-height: 1.1; color: var(--accent); }
  .brand-text p { margin: 0; font-size: 10.5px; color: var(--ink-muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .user-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--paper-deep);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 10px;
    color: var(--accent);
  }

  /* ======= 3-COLUMN LAYOUT ======= */
  .app-shell {
    display: grid;
    grid-template-columns: var(--sidebar-l) 1fr var(--sidebar-r);
    height: calc(100vh - var(--header-h));
    overflow: hidden;
  }

  /* ======= CỘT TRÁI: DS ĐỀ + BÀI ======= */
  .col-left {
    background: #fff;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-section-title {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 14px 6px;
  }
  /* DS đề (thu gọn) */
  .de-selector {
    padding: 0 10px 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .de-select-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--paper-soft);
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink);
    transition: all 0.15s;
  }
  .de-select-wrap:hover { border-color: var(--accent-soft); }
  .de-select-num {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    display: grid;
    place-items: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 14px;
  }
  .de-select-info { flex: 1; min-width: 0; }
  .de-select-label { font-weight: 600; font-size: 12px; }
  .de-select-meta { font-size: 10.5px; color: var(--ink-muted); }
  .chev { color: var(--ink-muted); font-size: 10px; transition: transform 0.2s; }
  .de-dropdown-open .chev { transform: rotate(180deg); }

  /* DS bài (chính) */
  .bai-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .bai-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 3px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .bai-item:hover { background: var(--paper-soft); }
  .bai-item.active {
    background: linear-gradient(to right, var(--accent-pale), transparent);
    border-color: rgba(139, 21, 56, 0.2);
  }
  .bai-item-num {
    width: 30px; height: 30px;
    border-radius: 7px;
    background: var(--paper-deep);
    color: var(--accent);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 13px;
    font-family: 'Cormorant Garamond', serif;
    flex-shrink: 0;
  }
  .bai-item.active .bai-item-num { background: var(--accent); color: white; }
  .bai-item-info { flex: 1; min-width: 0; }
  .bai-item-label { font-weight: 600; font-size: 12.5px; line-height: 1.2; }
  .bai-item-meta { font-size: 10.5px; color: var(--ink-muted); margin-top: 1px; }

  /* Drawer chọn đề (overlay) */
  .de-drawer {
    position: fixed;
    top: var(--header-h);
    left: 0;
    width: 280px;
    bottom: 0;
    background: white;
    border-right: 1px solid var(--line);
    transform: translateX(-100%);
    transition: transform 0.25s;
    z-index: 60;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-md);
  }
  .de-drawer.open { transform: translateX(0); }
  .de-drawer-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--paper-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .de-drawer-header h3 { margin: 0; font-size: 16px; color: var(--ink); }
  .close-drawer {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 20px;
    color: var(--ink-muted);
    padding: 0;
    width: 28px;
    height: 28px;
  }
  .de-drawer-list { flex: 1; overflow-y: auto; padding: 8px; }
  .de-drawer-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .de-drawer-item:hover { background: var(--paper-soft); }
  .de-drawer-item.active {
    background: var(--accent-pale);
    border-color: rgba(139, 21, 56, 0.2);
  }
  .de-drawer-item.locked { opacity: 0.4; cursor: not-allowed; }
  .de-drawer-item.locked:hover { background: transparent; }
  .de-drawer-num {
    width: 32px; height: 32px;
    border-radius: 7px;
    background: var(--paper-deep);
    color: var(--accent);
    display: grid;
    place-items: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 15px;
  }
  .de-drawer-item.active .de-drawer-num { background: var(--accent); color: white; }
  .overlay {
    position: fixed;
    inset: var(--header-h) 0 0 0;
    background: rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 25;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  /* ======= CỘT GIỮA: NỘI DUNG CHÍNH ======= */
  .col-center {
    overflow-y: auto;
    padding: 20px 28px;
    background: var(--paper);
  }
  .de-header-card {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .de-chip {
    display: inline-flex;
    align-items: center;
    padding: 2px 10px;
    background: var(--paper-soft);
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .de-header-card h2 {
    font-size: 24px;
    margin: 0 0 2px;
    color: var(--accent);
  }
  .de-header-card p { margin: 0; color: var(--ink-muted); font-size: 12.5px; }

  /* Bài */
  .de-bai-block {
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 14px;
  }
  .de-bai-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line-soft);
  }
  .de-bai-header-left { display: flex; align-items: baseline; gap: 10px; }
  .de-bai-header h3 { font-size: 22px; margin: 0; color: var(--ink); }
  .de-bai-diem {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    padding: 2px 9px;
    background: var(--accent-pale);
    border-radius: 999px;
  }
  .chu-de-chip {
    display: inline-block;
    font-size: 10.5px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .de-bai-content {
    font-size: 15px;
    line-height: 1.75;
  }
  .de-bai-content p { margin: 8px 0; }

  /* Hình vẽ */
  .figure-wrap {
    margin-top: 16px;
    padding: 14px;
    background: #fafafa;
    border: 1px solid var(--line-soft);
    border-radius: 10px;
    text-align: center;
  }
  .figure-img {
    max-width: min(100%, 460px);
    max-height: 340px;
    width: auto;
    height: auto;
    border-radius: 6px;
    background: white;
    display: block;
    margin: 0 auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: zoom-in;
    transition: transform 0.2s;
  }
  .figure-img:hover { transform: scale(1.02); }
  .figure-img.zoomed {
    max-width: 100%;
    max-height: none;
    cursor: zoom-out;
  }
  .figure-caption {
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-muted);
    font-style: italic;
  }
  .figure-note {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(192, 138, 43, 0.08);
    border: 1px dashed var(--gold);
    border-radius: 8px;
    font-size: 12.5px;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Khu hội thoại — ngay trong cột giữa */
  .conversation-section {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 2px dashed var(--line);
  }
  .conv-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .conversation {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .empty-conversation {
    padding: 30px 20px;
    text-align: center;
    color: var(--ink-muted);
    background: white;
    border: 1px dashed var(--line);
    border-radius: 12px;
  }
  .empty-conversation .emoji { font-size: 36px; display: block; margin-bottom: 8px; }
  .empty-conversation h4 { font-size: 17px; margin: 0 0 4px; color: var(--ink); }
  .empty-conversation p { margin: 0; font-size: 13px; }
  .bubble {
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.7;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bubble.user {
    background: var(--accent);
    color: white;
    align-self: flex-end;
    max-width: 80%;
    padding: 11px 16px;
    font-size: 14px;
    border-radius: 12px 12px 4px 12px;
  }
  .bubble.ai {
    background: white;
    border: 1px solid var(--line);
    color: var(--ink);
    position: relative;
    padding-top: 20px;
  }
  .bubble.ai::before {
    content: '';
    position: absolute;
    left: -1px; top: -1px;
    width: 5px;
    height: calc(100% + 2px);
    background: linear-gradient(to bottom, var(--accent), var(--accent-soft));
    border-radius: 12px 0 0 12px;
  }
  .bubble.ai .ai-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .bubble.ai .ai-label::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-pale);
  }
  .bubble.ai p { margin: 8px 0; }
  .bubble.ai p:first-child { margin-top: 0; }
  .bubble.ai p:last-child { margin-bottom: 0; }
  .bubble.ai h1, .bubble.ai h2, .bubble.ai h3, .bubble.ai h4 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin: 14px 0 6px;
    color: var(--accent);
  }
  .bubble.ai ul, .bubble.ai ol { margin: 8px 0; padding-left: 22px; }
  .bubble.ai li { margin: 4px 0; }
  .bubble.ai hr { border: none; border-top: 1px dashed var(--line); margin: 14px 0; }
  .bubble.ai code { background: var(--paper-soft); padding: 1px 6px; border-radius: 4px; font-size: 0.92em; }
  .bubble.ai strong { color: var(--ink); }
  .bubble.system {
    background: rgba(192, 138, 43, 0.1);
    color: var(--amber);
    border: 1px dashed var(--gold);
    padding: 8px 14px;
    font-size: 12px;
    align-self: center;
    border-radius: 999px;
  }

  /* KaTeX - chống tràn công thức trên điện thoại */
  .de-bai-block, .bubble.ai, .de-bai-content {
    max-width: 100%;
    overflow-x: hidden;
  }
  .de-bai-content table, .bubble.ai table {
    display: block;
    max-width: 100%;
    overflow-x: auto;
    border-collapse: collapse;
  }
  .katex { font-size: 1.05em !important; }
  .katex-display {
    margin: 12px 0 !important;
    max-width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 4px;
  }
  .katex-display > .katex {
    white-space: nowrap;
  }

  /* ======= CỘT PHẢI: CÂU HỎI + INPUT ======= */
  .col-right {
    background: white;
    border-left: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .col-right-header {
    padding: 14px 16px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-soft) 100%);
    color: white;
  }
  .col-right-header h3 {
    margin: 0;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
  }
  .col-right-header p {
    margin: 2px 0 0;
    font-size: 11px;
    opacity: 0.9;
  }

  /* Nhóm câu dẫn dọc */
  .cau-dan-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .group-block {
    margin-bottom: 6px;
    border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    user-select: none;
    transition: background 0.12s;
    border: 1px solid transparent;
    border-radius: 10px;
    color: var(--ink);
  }
  .group-header:hover { background: var(--paper-soft); }
  .group-block.open .group-header {
    background: var(--accent-pale);
    border-color: rgba(139, 21, 56, 0.15);
  }
  .group-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
  }
  .group-title-text { flex: 1; }
  .group-chev {
    color: var(--ink-muted);
    font-size: 10px;
    transition: transform 0.2s;
  }
  .group-block.open .group-chev { transform: rotate(90deg); }

  .group-body {
    display: none;
    padding: 6px 6px 8px;
  }
  .group-block.open .group-body { display: block; }

  .cau-dan-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 9px 11px;
    background: var(--paper-soft);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    font-size: 12.5px;
    color: var(--ink);
    cursor: pointer;
    margin: 3px 0;
    line-height: 1.45;
    font-family: inherit;
    transition: all 0.12s;
  }
  .cau-dan-item:hover {
    border-color: var(--accent-soft);
    background: white;
    transform: translateX(2px);
  }

  /* Input ở đáy cột phải */
  .input-section {
    border-top: 1px solid var(--line);
    padding: 12px;
    background: var(--paper-soft);
  }
  .input-section-title {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .input-wrap {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    resize: none;
    color: var(--ink);
    background: white;
    min-height: 40px;
    max-height: 120px;
    line-height: 1.5;
  }
  .chat-input:focus { outline: none; border-color: var(--accent-soft); box-shadow: 0 0 0 3px var(--accent-pale); }
  .btn-send {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--accent-soft); }
  .btn-attach {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: white;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-attach:hover { border-color: var(--accent-soft); color: var(--accent); background: var(--accent-pale); }
  .image-preview { display: none; align-items: center; gap: 8px; margin-bottom: 8px; padding: 7px 8px; border-radius: 10px; background: white; border: 1px solid var(--line); }
  .image-preview.show { display: flex; }
  .image-preview img { width: 42px; height: 42px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line-soft); }
  .image-preview span { flex: 1; min-width: 0; font-size: 12px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .remove-image { border: none; background: transparent; color: var(--ink-muted); font-size: 18px; cursor: pointer; width: 28px; height: 28px; border-radius: 50%; }
  .remove-image:hover { background: var(--paper-soft); color: var(--accent); }
  .bubble .bubble-image { display: block; max-width: min(220px, 100%); max-height: 220px; object-fit: contain; border-radius: 10px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.35); }
  .mobile-chat-fab { display: none; position: fixed; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom)); width: 46px; height: 46px; border-radius: 14px; border: 1px solid var(--line); background: #fffaf3; color: var(--ink-soft); box-shadow: 0 6px 16px rgba(74, 66, 60, 0.18); z-index: 45; align-items: center; justify-content: center; cursor: pointer; }
  .mobile-chat-fab svg { width: 21px; height: 21px; }

<script>
// ============ AUTH (Google Sheets whitelist) ============
const AUTH_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTc5A-ovEUQUz2c_n6y3WJO25imuBl-DrjXgEpp8pY9R2ka7PNRzpm13GWOyI8krxOBY3OjSJOpYujC/pub?output=csv';
const AUTH_STORAGE_KEY = 'hp_luyen_de_auth_v1';
const AUTH_EXPIRES_DAYS = 30;
const AUTH_MAX_FAILS = 5;
const AUTH_LOCKOUT_MS = 60 * 1000;

let _authFailCount = 0;
let _authLockedUntil = 0;

function authParseCSV(text) {
  // Parse CSV đơn giản (handle quoted fields có dấu phẩy)
  const rows = [];
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  for (const line of lines) {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        cells.push(cur.trim()); cur = '';
      } else cur += c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function authGetSession() {
  try {
    const raw = localStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.expires || obj.expires < Date.now()) {
      localStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    return obj;
  } catch (e) { return null; }
}

function authSaveSession(username, ten_lop) {
  const obj = {
    username,
    ten_lop,
    expires: Date.now() + AUTH_EXPIRES_DAYS * 24 * 60 * 60 * 1000
  };
  localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(obj));
  return obj;
}

function authLogout() {
  localStorage.removeItem(AUTH_STORAGE_KEY);
  location.reload();
}

function authShowError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.add('show');
}

function authClearError() {
  const el = document.getElementById('login-error');
  el.classList.remove('show');
}

async function authVerify(username, password) {
  // Cache-bust để mỗi lần check là dữ liệu mới (chấp nhận latency ~1s)
  const url = AUTH_CSV_URL + (AUTH_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
  const res = await fetch(url, { cache: 'no-cache' });
  if (!res.ok) throw new Error('Không tải được danh sách (HTTP ' + res.status + ')');
  const text = await res.text();
  const rows = authParseCSV(text);
  if (rows.length < 2) throw new Error('Danh sách trống');
  // Bỏ header dòng 1
  for (let i = 1; i < rows.length; i++) {
    const [u, p, lop] = rows[i];
    if (!u || !p) continue;
    if (u.trim().toLowerCase() === username.trim().toLowerCase() && p === password) {
      return { username: u.trim(), ten_lop: (lop || u).trim() };
    }
  }
  return null;
}

function authRenderUserChip(session) {
  const name = session.ten_lop || session.username;
  document.getElementById('user-name').textContent = name;
  // Avatar = ký tự đầu của tên (lấy chữ cái đầu của từ cuối, vì format thường là "Họ Tên - Lớp")
  const namePart = name.split(/[-–—]/)[0].trim();
  const words = namePart.split(/\s+/);
  const lastWord = words[words.length - 1] || namePart;
  document.getElementById('user-avatar').textContent = (lastWord[0] || '?').toUpperCase();
}

async function authHandleLogin() {
  authClearError();
  if (Date.now() < _authLockedUntil) {
    const sec = Math.ceil((_authLockedUntil - Date.now()) / 1000);
    authShowError(`Sai quá nhiều lần. Thử lại sau ${sec} giây.`);
    return;
  }
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if (!u || !p) {
    authShowError('Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.');
    return;
  }
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Đang kiểm tra...';
  try {
    const result = await authVerify(u, p);
    if (!result) {
      _authFailCount++;
      if (_authFailCount >= AUTH_MAX_FAILS) {
        _authLockedUntil = Date.now() + AUTH_LOCKOUT_MS;
        _authFailCount = 0;
        authShowError(`Sai quá nhiều lần. Vui lòng thử lại sau 60 giây.`);
      } else {
        authShowError(`Tên đăng nhập hoặc mật khẩu không đúng. (${_authFailCount}/${AUTH_MAX_FAILS})`);
      }
      btn.disabled = false;
      btn.textContent = 'Đăng nhập';
      return;
    }
    const session = authSaveSession(result.username, result.ten_lop);
    authRenderUserChip(session);
    document.getElementById('login-screen').classList.add('hidden');
  } catch (e) {
    authShowError('Lỗi kết nối. Vui lòng kiểm tra mạng và thử lại.');
    console.error(e);
    btn.disabled = false;
    btn.textContent = 'Đăng nhập';
  }
}

function authInit() {
  // Nếu đã có session hợp lệ → bỏ qua login
  const session = authGetSession();
  if (session) {
    authRenderUserChip(session);
    document.getElementById('login-screen').classList.add('hidden');
    return;
  }
  // Setup form login
  const btn = document.getElementById('login-btn');
  btn.addEventListener('click', authHandleLogin);
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') authHandleLogin();
  });
  document.getElementById('login-username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-password').focus();
  });
  setTimeout(() => document.getElementById('login-username').focus(), 100);
}

// Logout button
document.getElementById('logout-btn').addEventListener('click', () => {
  if (confirm('Đăng xuất khỏi ứng dụng?')) authLogout();
});

// Khởi động auth ngay
authInit();

const DE_1_DATA = JSON.parse("{\"de_so\":1,\"cum\":1,\"nam_hoc\":\"2026-2027\",\"nguon\":\"H\u1ed9i \u0111\u1ed3ng b\u1ed9 m\u00f4n To\u00e1n TP.HCM - \u0110\u1ec1 tham kh\u1ea3o tuy\u1ec3n sinh 10\",\"bai\":[{\"bai_so\":1,\"diem\":1.5,\"chu_de\":\"H\u00e0m s\u1ed1 b\u1eadc hai - \u0110\u1ed3 th\u1ecb parabol\",\"de_bai\":\"Cho h\u00e0m s\u1ed1 $(P): y = \\\\dfrac{x^2}{4}$.\\n\\na) V\u1ebd \u0111\u1ed3 th\u1ecb $(P)$.\\n\\nb) T\u00ecm \u0111i\u1ec3m $K$ thu\u1ed9c $(P)$ c\u00f3 tung \u0111\u1ed9 nh\u1ecf h\u01a1n ho\u00e0nh \u0111\u1ed9 1 \u0111\u01a1n v\u1ecb.\",\"phuong_phap_duoc_dung\":[\"L\u1eadp b\u1ea3ng gi\u00e1 tr\u1ecb \u0111\u1ec3 v\u1ebd parabol\",\"Thay t\u1ecda \u0111\u1ed9 \u0111i\u1ec3m v\u00e0o ph\u01b0\u01a1ng tr\u00ecnh (P)\",\"Gi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc hai\"],\"kien_thuc_lien_quan\":[\"H\u00e0m s\u1ed1 y = ax\u00b2 (a \u2260 0)\",\"\u0110i\u1ec3m thu\u1ed9c \u0111\u1ed3 th\u1ecb th\u00ec t\u1ecda \u0111\u1ed9 th\u1ecfa m\u00e3n ph\u01b0\u01a1ng tr\u00ecnh\"],\"dap_so\":\"\u0110i\u1ec3m K c\u00f3 t\u1ecda \u0111\u1ed9 $(2; 1)$.\",\"goi_y_cap_1\":\"C\u00e2u a: Em l\u1eadp b\u1ea3ng gi\u00e1 tr\u1ecb v\u1edbi c\u00e1c gi\u00e1 tr\u1ecb x = -4, -2, 0, 2, 4 r\u1ed3i v\u1ebd parabol \u0111i qua c\u00e1c \u0111i\u1ec3m \u0111\u00f3. Nh\u1edb \u0111\u1ec9nh parabol l\u00e0 O(0;0).\\n\\nC\u00e2u b: 'Tung \u0111\u1ed9 nh\u1ecf h\u01a1n ho\u00e0nh \u0111\u1ed9 1 \u0111\u01a1n v\u1ecb' ngh\u0129a l\u00e0 $y = x - 1$. K\u1ebft h\u1ee3p v\u1edbi ph\u01b0\u01a1ng tr\u00ecnh (P) \u0111\u1ec3 t\u00ecm x.\",\"goi_y_cap_2\":\"C\u00e2u a:\\n- L\u1eadp b\u1ea3ng: $x = -4 \\\\to y = 4$; $x = -2 \\\\to y = 1$; $x = 0 \\\\to y = 0$; $x = 2 \\\\to y = 1$; $x = 4 \\\\to y = 4$\\n- V\u1ebd parabol \u0111i qua 5 \u0111i\u1ec3m tr\u00ean, \u0111\u1ec9nh t\u1ea1i O.\\n\\nC\u00e2u b:\\n- \u0110i\u1ec3m K \u2208 (P) v\u00e0 c\u00f3 y = x - 1\\n- Thay v\u00e0o (P): $x - 1 = \\\\dfrac{x^2}{4}$\\n- \u0110\u01b0a v\u1ec1 ph\u01b0\u01a1ng tr\u00ecnh: $\\\\dfrac{x^2}{4} - x + 1 = 0$\\n- Gi\u1ea3i t\u00ecm x, r\u1ed3i t\u00ednh y t\u01b0\u01a1ng \u1ee9ng.\",\"loi_giai_day_du\":\"**C\u00e2u a) V\u1ebd \u0111\u1ed3 th\u1ecb (P):**\\n\\nB\u1ea3ng gi\u00e1 tr\u1ecb:\\n\\n| $x$ | $-4$ | $-2$ | $0$ | $2$ | $4$ |\\n|---|---|---|---|---|---|\\n| $y = \\\\dfrac{x^2}{4}$ | $4$ | $1$ | $0$ | $1$ | $4$ |\\n\\nV\u1ebd parabol \u0111i qua c\u00e1c \u0111i\u1ec3m $(-4; 4), (-2; 1), (0; 0), (2; 1), (4; 4)$.\\n\\n**C\u00e2u b) T\u00ecm \u0111i\u1ec3m K:**\\n\\nV\u00ec \u0111i\u1ec3m $K$ c\u00f3 tung \u0111\u1ed9 nh\u1ecf h\u01a1n ho\u00e0nh \u0111\u1ed9 1 \u0111\u01a1n v\u1ecb n\u00ean $y = x - 1$.\\n\\nTa c\u00f3 ph\u01b0\u01a1ng tr\u00ecnh: $x - 1 = \\\\dfrac{x^2}{4}$\\n\\n$\\\\Leftrightarrow \\\\dfrac{x^2}{4} - x + 1 = 0$\\n\\n$\\\\Leftrightarrow x^2 - 4x + 4 = 0$\\n\\n$\\\\Leftrightarrow (x - 2)^2 = 0$\\n\\n$\\\\Rightarrow x = 2$.\\n\\nV\u1edbi $x = 2$ suy ra $y = 1$.\\n\\nV\u1eady t\u1ecda \u0111\u1ed9 \u0111i\u1ec3m c\u1ea7n t\u00ecm l\u00e0 $\\\\boxed{K(2; 1)}$.\",\"co_hinh_ve\":true,\"ghi_chu_hinh\":\"H\u00ecnh v\u1ebd parabol (P): y = x\u00b2/4 tr\u00ean h\u1ec7 tr\u1ee5c t\u1ecda \u0111\u1ed9 Oxy.\",\"cau_dan\":{\"khoi_dong\":[\"Em ch\u01b0a bi\u1ebft parabol y = x\u00b2/4 v\u1ebd th\u1ebf n\u00e0o.\",\"'Tung \u0111\u1ed9 nh\u1ecf h\u01a1n ho\u00e0nh \u0111\u1ed9 1 \u0111\u01a1n v\u1ecb' ngh\u0129a l\u00e0 g\u00ec th\u1ea7y?\",\"\u0110\u1ec3 v\u1ebd (P) em c\u1ea7n l\u00e0m nh\u1eefng b\u01b0\u1edbc n\u00e0o?\"],\"dinh_huong\":[\"Em \u0111\u1ecbnh l\u1eadp b\u1ea3ng gi\u00e1 tr\u1ecb v\u1edbi x = -4, -2, 0, 2, 4 \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"C\u00e2u b em \u0111\u1ecbnh thay y = x - 1 v\u00e0o (P) \u2014 c\u00f3 \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\",\"Em c\u00f3 c\u1ea7n x\u00e9t \u0111i\u1ec1u ki\u1ec7n g\u00ec cho \u0111i\u1ec3m K kh\u00f4ng?\"],\"kiem_tra\":[\"Em v\u1ebd parabol v\u1edbi \u0111\u1ec9nh O, \u0111i qua (\u00b12, 1), (\u00b14, 4) \u2014 \u0111\u00fang ch\u01b0a?\",\"Em ra K(2; 1) \u2014 \u0111\u00e1p \u00e1n n\u00e0y c\u00f3 \u0111\u00fang kh\u00f4ng th\u1ea7y?\",\"Ph\u01b0\u01a1ng tr\u00ecnh x\u00b2/4 - x + 1 = 0 em gi\u1ea3i ra x = 2 \u2014 c\u00f3 ph\u1ea3i ch\u1ec9 1 nghi\u1ec7m?\"],\"go_bi\":[\"Em kh\u00f4ng bi\u1ebft thay y = x - 1 v\u00e0o (P) th\u1ebf n\u00e0o.\",\"Em gi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh x\u00b2 - 4x + 4 = 0 kh\u00f4ng ra.\",\"Em l\u1eadp b\u1ea3ng gi\u00e1 tr\u1ecb nh\u01b0ng v\u1ebd parabol sai.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]},\"hinh_anh\":\"/images/de-1/bai1-parabol.png\"},{\"bai_so\":2,\"diem\":1.0,\"chu_de\":\"\u0110\u1ecbnh l\u00fd Vi\u00e8te\",\"de_bai\":\"Cho ph\u01b0\u01a1ng tr\u00ecnh $3x^2 + 2x - 5 = 0$.\\n\\na) Ch\u1ee9ng minh ph\u01b0\u01a1ng tr\u00ecnh tr\u00ean c\u00f3 hai nghi\u1ec7m ph\u00e2n bi\u1ec7t $x_1, x_2$.\\n\\nb) Kh\u00f4ng gi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh, t\u00ednh gi\u00e1 tr\u1ecb c\u1ee7a bi\u1ec3u th\u1ee9c:\\n$$T = (x_1 - 2x_2)(x_2 - x_1) + x_2^2$$\",\"phuong_phap_duoc_dung\":[\"T\u00ednh bi\u1ec7t th\u1ee9c \u0394\",\"\u0110\u1ecbnh l\u00fd Vi\u00e8te\",\"Bi\u1ebfn \u0111\u1ed5i bi\u1ec3u th\u1ee9c \u0111\u1ed1i x\u1ee9ng v\u1ec1 t\u1ed5ng v\u00e0 t\u00edch hai nghi\u1ec7m\"],\"kien_thuc_lien_quan\":[\"C\u00f4ng th\u1ee9c \u0394 = b\u00b2 - 4ac\",\"\u0110\u1ecbnh l\u00fd Vi\u00e8te: x\u2081 + x\u2082 = -b/a, x\u2081x\u2082 = c/a\",\"H\u1eb1ng \u0111\u1eb3ng th\u1ee9c: x\u2081\u00b2 + x\u2082\u00b2 = (x\u2081+x\u2082)\u00b2 - 2x\u2081x\u2082\"],\"dap_so\":\"$T = -\\\\dfrac{79}{9}$\",\"goi_y_cap_1\":\"C\u00e2u a: T\u00ednh \u0394 = b\u00b2 - 4ac. N\u1ebfu \u0394 > 0 th\u00ec c\u00f3 2 nghi\u1ec7m ph\u00e2n bi\u1ec7t.\\n\\nC\u00e2u b: Khai tri\u1ec3n bi\u1ec3u th\u1ee9c T, r\u1ed3i d\u00f9ng Vi\u00e8te \u0111\u1ec3 t\u00ednh t\u1ed5ng v\u00e0 t\u00edch. Ch\u00fa \u00fd $x_1^2 + x_2^2$ bi\u1ebfn \u0111\u1ed5i \u0111\u01b0\u1ee3c v\u1ec1 d\u1ea1ng ch\u1ee9a t\u1ed5ng v\u00e0 t\u00edch.\",\"goi_y_cap_2\":\"C\u00e2u a:\\n- $a = 3, b = 2, c = -5$\\n- T\u00ednh $\\\\Delta = 2^2 - 4 \\\\cdot 3 \\\\cdot (-5) = 64 > 0$\\n\\nC\u00e2u b:\\n- Vi\u00e8te: $x_1 + x_2 = -\\\\dfrac{2}{3}$, $x_1 x_2 = -\\\\dfrac{5}{3}$\\n- T\u00ednh $x_1^2 + x_2^2 = (x_1+x_2)^2 - 2x_1x_2 = \\\\dfrac{34}{9}$\\n- Khai tri\u1ec3n T = $x_1x_2 - x_1^2 - 2x_2^2 + 2x_1x_2 + x_2^2 = 3x_1x_2 - (x_1^2 + x_2^2)$\\n- Thay s\u1ed1 \u0111\u1ec3 t\u00ednh ra T.\",\"loi_giai_day_du\":\"**C\u00e2u a) Ch\u1ee9ng minh ph\u01b0\u01a1ng tr\u00ecnh c\u00f3 2 nghi\u1ec7m ph\u00e2n bi\u1ec7t:**\\n\\nTa c\u00f3 $3x^2 + 2x - 5 = 0$ v\u1edbi $a = 3; b = 2; c = -5$.\\n\\nT\u00ednh $\\\\Delta = b^2 - 4ac = 2^2 - 4 \\\\cdot 3 \\\\cdot (-5) = 4 + 60 = 64 > 0$.\\n\\nV\u00ec $\\\\Delta > 0$ n\u00ean ph\u01b0\u01a1ng tr\u00ecnh c\u00f3 hai nghi\u1ec7m ph\u00e2n bi\u1ec7t $x_1, x_2$. \u25a1\\n\\n**C\u00e2u b) T\u00ednh T:**\\n\\nTheo \u0111\u1ecbnh l\u00fd Vi\u00e8te:\\n$$\\\\begin{cases} x_1 + x_2 = -\\\\dfrac{b}{a} = -\\\\dfrac{2}{3} \\\\\\\\ x_1 x_2 = \\\\dfrac{c}{a} = -\\\\dfrac{5}{3} \\\\end{cases}$$\\n\\nTa c\u00f3:\\n$$x_1^2 + x_2^2 = (x_1+x_2)^2 - 2x_1 x_2 = \\\\left(-\\\\dfrac{2}{3}\\\\right)^2 - 2 \\\\cdot \\\\left(-\\\\dfrac{5}{3}\\\\right) = \\\\dfrac{4}{9} + \\\\dfrac{10}{3} = \\\\dfrac{34}{9}$$\\n\\nKhai tri\u1ec3n T:\\n$$T = (x_1 - 2x_2)(x_2 - x_1) + x_2^2$$\\n$$= x_1 x_2 - x_1^2 - 2x_2^2 + 2x_1 x_2 + x_2^2$$\\n$$= 3x_1 x_2 - (x_1^2 + x_2^2)$$\\n$$= 3 \\\\cdot \\\\left(-\\\\dfrac{5}{3}\\\\right) - \\\\dfrac{34}{9}$$\\n$$= -5 - \\\\dfrac{34}{9} = -\\\\dfrac{45 + 34}{9}$$\\n\\n$$\\\\boxed{T = -\\\\dfrac{79}{9}}$$\",\"co_hinh_ve\":false,\"cau_dan\":{\"khoi_dong\":[\"Em ch\u01b0a hi\u1ec3u 'ch\u1ee9ng minh 2 nghi\u1ec7m ph\u00e2n bi\u1ec7t' l\u00e0 l\u00e0m g\u00ec?\",\"Em qu\u00ean c\u00f4ng th\u1ee9c t\u00ednh \u0394 r\u1ed3i th\u1ea7y.\",\"\u0110\u1ecbnh l\u00fd Vi\u00e8te l\u00e0 g\u00ec v\u1eady th\u1ea7y?\"],\"dinh_huong\":[\"Em \u0111\u1ecbnh t\u00ednh \u0394 = b\u00b2 - 4ac r\u1ed3i so s\u00e1nh v\u1edbi 0 \u2014 \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\",\"C\u00e2u b em \u0111\u1ecbnh khai tri\u1ec3n bi\u1ec3u th\u1ee9c T tr\u01b0\u1edbc \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"Em th\u1ea5y c\u00f3 x\u2081\u00b2 + x\u2082\u00b2 n\u00ean c\u1ea7n bi\u1ebfn \u0111\u1ed5i v\u1ec1 (x\u2081+x\u2082)\u00b2 - 2x\u2081x\u2082 \u2014 \u0111\u00fang kh\u00f4ng?\"],\"kiem_tra\":[\"Em t\u00ednh \u0394 = 64 \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng th\u1ea7y?\",\"Em ra x\u2081 + x\u2082 = -2/3 v\u00e0 x\u2081x\u2082 = -5/3 \u2014 Vi\u00e8te em d\u00f9ng \u0111\u00fang ch\u01b0a?\",\"Em ra T = -79/9 \u2014 \u0111\u00e1p \u00e1n c\u00f3 \u0111\u00fang kh\u00f4ng?\"],\"go_bi\":[\"Em khai tri\u1ec3n T ra kh\u00f4ng \u0111\u00fang.\",\"Em t\u00ednh x\u2081\u00b2 + x\u2082\u00b2 b\u1eb1ng (x\u2081+x\u2082)\u00b2 - 2x\u2081x\u2082 nh\u01b0ng ra sai.\",\"Em kh\u00f4ng bi\u1ebft t\u1ea1i sao \u0394 > 0 th\u00ec c\u00f3 2 nghi\u1ec7m ph\u00e2n bi\u1ec7t.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]}},{\"bai_so\":3,\"diem\":1.5,\"chu_de\":\"Th\u1ed1ng k\u00ea - X\u00e1c su\u1ea5t\",\"de_bai\":\"Th\u1eddi gian t\u1ef1 h\u1ecdc t\u1ea1i nh\u00e0 c\u1ee7a b\u1ea1n T\u00fa trong m\u1ed9t tu\u1ea7n (\u0111\u01a1n v\u1ecb: ph\u00fat) \u0111\u01b0\u1ee3c cho trong b\u1ea3ng:\\n\\n| Th\u1ee9 | Hai | Ba | T\u01b0 | N\u0103m | S\u00e1u | B\u1ea3y | CN |\\n|---|---|---|---|---|---|---|---|\\n| Ph\u00fat | 162 | 135 | 170 | 150 | 180 | 175 | 190 |\\n\\na) T\u00ednh th\u1eddi gian trung b\u00ecnh b\u1ea1n T\u00fa t\u1ef1 h\u1ecdc t\u1ea1i nh\u00e0 m\u1ed7i ng\u00e0y trong m\u1ed9t tu\u1ea7n.\\n\\nb) Ch\u1ecdn ng\u1eabu nhi\u00ean m\u1ed9t ng\u00e0y trong tu\u1ea7n, t\u00ednh x\u00e1c su\u1ea5t c\u1ee7a c\u00e1c bi\u1ebfn c\u1ed1 sau:\\n- $A$: \\\"Ng\u00e0y \u0111\u01b0\u1ee3c ch\u1ecdn c\u00f3 th\u1eddi gian t\u1ef1 h\u1ecdc t\u1ea1i nh\u00e0 c\u1ee7a b\u1ea1n T\u00fa l\u1edbn h\u01a1n 170 ph\u00fat\\\"\\n- $B$: \\\"Ng\u00e0y \u0111\u01b0\u1ee3c ch\u1ecdn c\u00f3 th\u1eddi gian t\u1ef1 h\u1ecdc t\u1ea1i nh\u00e0 c\u1ee7a b\u1ea1n T\u00fa kh\u00f4ng qu\u00e1 160 ph\u00fat\\\"\",\"phuong_phap_duoc_dung\":[\"T\u00ednh trung b\u00ecnh c\u1ed9ng\",\"Li\u1ec7t k\u00ea kh\u00f4ng gian m\u1eabu v\u00e0 bi\u1ebfn c\u1ed1\",\"C\u00f4ng th\u1ee9c x\u00e1c su\u1ea5t c\u1ed5 \u0111i\u1ec3n P(A) = n(A)/n(\u03a9)\"],\"kien_thuc_lien_quan\":[\"Trung b\u00ecnh c\u1ed9ng\",\"X\u00e1c su\u1ea5t c\u1ee7a bi\u1ebfn c\u1ed1\",\"Kh\u00f4ng gian m\u1eabu\"],\"dap_so\":\"a) Trung b\u00ecnh 166 ph\u00fat/ng\u00e0y. b) $P(A) = \\\\dfrac{3}{7}$, $P(B) = \\\\dfrac{2}{7}$.\",\"goi_y_cap_1\":\"C\u00e2u a: C\u1ed9ng 7 ng\u00e0y r\u1ed3i chia cho 7.\\n\\nC\u00e2u b: Li\u1ec7t k\u00ea c\u00e1c ng\u00e0y thu\u1eadn l\u1ee3i cho m\u1ed7i bi\u1ebfn c\u1ed1 (c\u1ea9n th\u1eadn ch\u1eef 'l\u1edbn h\u01a1n 170' v\u00e0 'kh\u00f4ng qu\u00e1 160' ngh\u0129a l\u00e0 g\u00ec). \u00c1p d\u1ee5ng c\u00f4ng th\u1ee9c P = s\u1ed1 tr\u01b0\u1eddng h\u1ee3p thu\u1eadn l\u1ee3i / t\u1ed5ng s\u1ed1 tr\u01b0\u1eddng h\u1ee3p.\",\"goi_y_cap_2\":\"C\u00e2u a:\\n- T\u1ed5ng = 162 + 135 + 170 + 150 + 180 + 175 + 190 = 1162\\n- Trung b\u00ecnh = 1162 / 7 = 166 ph\u00fat\\n\\nC\u00e2u b:\\n- Kh\u00f4ng gian m\u1eabu \u03a9 = {Th\u1ee9 2, 3, 4, 5, 6, 7, CN}, n(\u03a9) = 7\\n- Bi\u1ebfn c\u1ed1 A: 'l\u1edbn h\u01a1n 170' \u2192 c\u00e1c ng\u00e0y c\u00f3 > 170: Th\u1ee9 6 (180), Th\u1ee9 7 (175), CN (190) \u2192 n(A) = 3\\n- Bi\u1ebfn c\u1ed1 B: 'kh\u00f4ng qu\u00e1 160' t\u1ee9c l\u00e0 \u2264 160 \u2192 c\u00e1c ng\u00e0y \u2264 160: Th\u1ee9 3 (135), Th\u1ee9 5 (150) \u2192 n(B) = 2\\n- P(A) = 3/7, P(B) = 2/7\",\"loi_giai_day_du\":\"**C\u00e2u a) Trung b\u00ecnh m\u1ed7i ng\u00e0y:**\\n\\nT\u1ed5ng th\u1eddi gian t\u1ef1 h\u1ecdc c\u1ee7a T\u00fa trong tu\u1ea7n l\u00e0:\\n$$162 + 135 + 170 + 150 + 180 + 175 + 190 = 1162 \\\\text{ (ph\u00fat)}$$\\n\\nTh\u1eddi gian trung b\u00ecnh b\u1ea1n T\u00fa t\u1ef1 h\u1ecdc t\u1ea1i nh\u00e0 m\u1ed7i ng\u00e0y l\u00e0:\\n$$\\\\dfrac{1162}{7} = \\\\boxed{166 \\\\text{ (ph\u00fat)}}$$\\n\\n**C\u00e2u b) T\u00ednh x\u00e1c su\u1ea5t:**\\n\\nG\u1ecdi kh\u00f4ng gian m\u1eabu l\u00e0 $\\\\Omega$.\\n\\nT\u1eadp h\u1ee3p c\u00e1c ng\u00e0y trong tu\u1ea7n l\u00e0: $\\\\Omega = \\\\{\\\\text{Th\u1ee9 2; Th\u1ee9 3; Th\u1ee9 4; Th\u1ee9 5; Th\u1ee9 6; Th\u1ee9 7; CN}\\\\}$.\\n\\nSuy ra $n(\\\\Omega) = 7$.\\n\\n**Bi\u1ebfn c\u1ed1 A** (l\u1edbn h\u01a1n 170 ph\u00fat):\\n\\nC\u00e1c ng\u00e0y thu\u1eadn l\u1ee3i cho $A$: Th\u1ee9 6 (180), Th\u1ee9 7 (175), Ch\u1ee7 nh\u1eadt (190). Suy ra $n(A) = 3$.\\n\\n$$P(A) = \\\\dfrac{n(A)}{n(\\\\Omega)} = \\\\boxed{\\\\dfrac{3}{7}}$$\\n\\n**Bi\u1ebfn c\u1ed1 B** (kh\u00f4ng qu\u00e1 160 ph\u00fat, t\u1ee9c l\u00e0 \u2264 160):\\n\\nC\u00e1c ng\u00e0y thu\u1eadn l\u1ee3i cho $B$: Th\u1ee9 3 (135), Th\u1ee9 5 (150). Suy ra $n(B) = 2$.\\n\\n$$P(B) = \\\\dfrac{n(B)}{n(\\\\Omega)} = \\\\boxed{\\\\dfrac{2}{7}}$$\",\"co_hinh_ve\":true,\"ghi_chu_hinh\":\"Bi\u1ec3u \u0111\u1ed3 c\u1ed9t th\u1eddi gian t\u1ef1 h\u1ecdc c\u1ee7a T\u00fa trong 7 ng\u00e0y.\",\"cau_dan\":{\"khoi_dong\":[\"Em kh\u00f4ng bi\u1ebft \u0111\u1ecdc s\u1ed1 li\u1ec7u t\u1eeb bi\u1ec3u \u0111\u1ed3 c\u1ed9t.\",\"Trung b\u00ecnh c\u1ed9ng l\u00e0 g\u00ec th\u1ea7y nh\u1eafc l\u1ea1i v\u1edbi?\",\"C\u00f4ng th\u1ee9c P(A) = n(A)/n(\u03a9) ngh\u0129a l\u00e0 g\u00ec?\"],\"dinh_huong\":[\"Em \u0111\u1ecbnh c\u1ed9ng 7 s\u1ed1 r\u1ed3i chia 7 \u2014 c\u00e2u a \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\",\"'Ng\u00e0y l\u1edbn h\u01a1n 170 ph\u00fat' \u2014 em ph\u1ea3i t\u00ecm c\u00e1c ng\u00e0y c\u00f3 s\u1ed1 ph\u00fat > 170 \u0111\u00fang kh\u00f4ng?\",\"'Kh\u00f4ng qu\u00e1 160' ngh\u0129a l\u00e0 \u2264 160 hay < 160 th\u1ea7y?\"],\"kiem_tra\":[\"Em t\u00ednh t\u1ed5ng = 1162, trung b\u00ecnh = 166 \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"Em li\u1ec7t k\u00ea bi\u1ebfn c\u1ed1 A \u0111\u01b0\u1ee3c 3 ng\u00e0y (Th\u1ee9 6, 7, CN) \u2014 \u0111\u00fang ch\u01b0a?\",\"Em ra P(A) = 3/7 v\u00e0 P(B) = 2/7 \u2014 \u0111\u00e1p \u00e1n ch\u00ednh x\u00e1c kh\u00f4ng?\"],\"go_bi\":[\"Em kh\u00f4ng bi\u1ebft ph\u00e2n bi\u1ec7t 'l\u1edbn h\u01a1n' v\u00e0 'kh\u00f4ng nh\u1ecf h\u01a1n'.\",\"Em li\u1ec7t k\u00ea bi\u1ebfn c\u1ed1 A v\u00e0 B b\u1ecb nh\u1ea7m.\",\"Em ng\u1ea1i kh\u00f4ng gian m\u1eabu \u2014 kh\u00f4ng bi\u1ebft vi\u1ebft th\u1ebf n\u00e0o.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]},\"hinh_anh\":\"/images/de-1/bai3-bieudocot.png\"},{\"bai_so\":4,\"diem\":1.0,\"chu_de\":\"B\u00e0i to\u00e1n th\u1ef1c t\u1ebf - Ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc hai\",\"de_bai\":\"Tr\u00ean m\u1ed9t mi\u1ebfng \u0111\u1ea5t h\u00ecnh ch\u1eef nh\u1eadt c\u00f3 chi\u1ec1u r\u1ed9ng l\u00e0 $x$ (m) ($x > 0$), chi\u1ec1u d\u00e0i l\u00e0 $2x + 10$ (m), ng\u01b0\u1eddi ta l\u00e0m m\u1ed9t l\u1ed1i \u0111i h\u00ecnh b\u00ecnh h\u00e0nh c\u00f3 b\u1ec1 r\u1ed9ng l\u00e0 2 m. Ph\u1ea7n c\u00f2n l\u1ea1i l\u00e0 hai mi\u1ebfng \u0111\u1ea5t h\u00ecnh thang vu\u00f4ng c\u00f3 di\u1ec7n t\u00edch b\u1eb1ng nhau, ng\u01b0\u1eddi ta d\u1ef1 ki\u1ebfn tr\u1ed3ng hoa h\u1ed3ng v\u00e0 hoa c\u00fac.\\n\\na) Vi\u1ebft bi\u1ec3u th\u1ee9c $A$ bi\u1ec3u di\u1ec5n di\u1ec7n t\u00edch tr\u1ed3ng hoa h\u1ed3ng theo $x$.\\n\\nb) Ng\u01b0\u1eddi ta d\u1ef1 ki\u1ebfn l\u00e1t s\u1ecfi l\u1ed1i \u0111i, chi ph\u00ed cho m\u1ed7i m\u00e9t vu\u00f4ng l\u00e1t s\u1ecfi h\u1ebft 120 ngh\u00ecn \u0111\u1ed3ng. H\u1ecfi chi ph\u00ed \u0111\u1ec3 l\u00e0m l\u1ed1i \u0111i l\u00e0 bao nhi\u00eau? Bi\u1ebft di\u1ec7n t\u00edch mi\u1ebfng \u0111\u1ea5t tr\u1ed3ng hoa h\u1ed3ng l\u00e0 45 m\u00b2.\",\"phuong_phap_duoc_dung\":[\"Bi\u1ec3u di\u1ec5n di\u1ec7n t\u00edch b\u1eb1ng bi\u1ec3u th\u1ee9c ch\u1ee9a \u1ea9n\",\"L\u1eadp v\u00e0 gi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc hai\",\"Ch\u1ecdn nghi\u1ec7m theo \u0111i\u1ec1u ki\u1ec7n c\u1ee7a \u1ea9n\"],\"kien_thuc_lien_quan\":[\"Di\u1ec7n t\u00edch h\u00ecnh ch\u1eef nh\u1eadt\",\"Di\u1ec7n t\u00edch h\u00ecnh b\u00ecnh h\u00e0nh\",\"Ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc hai\"],\"dap_so\":\"a) $A = x^2 + 4x$ (m\u00b2). b) Chi ph\u00ed: 1 200 000 \u0111\u1ed3ng.\",\"goi_y_cap_1\":\"C\u00e2u a: Di\u1ec7n t\u00edch tr\u1ed3ng hoa h\u1ed3ng = (Di\u1ec7n t\u00edch c\u1ea3 mi\u1ebfng \u0111\u1ea5t - Di\u1ec7n t\u00edch l\u1ed1i \u0111i) / 2 (v\u00ec 2 ph\u1ea7n b\u1eb1ng nhau).\\n\\nC\u00e2u b: Cho $A = 45$, gi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc hai t\u00ecm x. Ch\u1ecdn nghi\u1ec7m d\u01b0\u01a1ng. T\u00ednh di\u1ec7n t\u00edch l\u1ed1i \u0111i r\u1ed3i nh\u00e2n v\u1edbi 120 000 \u0111\u1ed3ng.\",\"goi_y_cap_2\":\"C\u00e2u a:\\n- Di\u1ec7n t\u00edch l\u1ed1i \u0111i h\u00ecnh b\u00ecnh h\u00e0nh = b\u1ec1 r\u1ed9ng \u00d7 chi\u1ec1u r\u1ed9ng mi\u1ebfng \u0111\u1ea5t = $2 \\\\cdot x = 2x$ (m\u00b2)\\n- Di\u1ec7n t\u00edch c\u1ea3 mi\u1ebfng \u0111\u1ea5t = $x(2x+10) = 2x^2 + 10x$ (m\u00b2)\\n- Di\u1ec7n t\u00edch tr\u1ed3ng hoa = $2x^2 + 10x - 2x = 2x^2 + 8x$ (m\u00b2)\\n- Di\u1ec7n t\u00edch tr\u1ed3ng hoa h\u1ed3ng = n\u1eeda c\u1ee7a di\u1ec7n t\u00edch tr\u1ed3ng hoa = $x^2 + 4x$ (m\u00b2)\\n\\nC\u00e2u b:\\n- Ph\u01b0\u01a1ng tr\u00ecnh: $x^2 + 4x = 45$ \u2192 $x^2 + 4x - 45 = 0$\\n- Gi\u1ea3i: $x_1 = 5$ (nh\u1eadn), $x_2 = -9$ (lo\u1ea1i)\\n- Di\u1ec7n t\u00edch l\u1ed1i \u0111i = $2 \\\\cdot 5 = 10$ (m\u00b2)\\n- Chi ph\u00ed = $10 \\\\cdot 120\\\\,000 = 1\\\\,200\\\\,000$ \u0111\u1ed3ng\",\"loi_giai_day_du\":\"**C\u00e2u a) L\u1eadp bi\u1ec3u th\u1ee9c A:**\\n\\nDi\u1ec7n t\u00edch c\u1ee7a l\u1ed1i \u0111i h\u00ecnh b\u00ecnh h\u00e0nh l\u00e0 $2 \\\\cdot x = 2x$ (m\u00b2).\\n\\nDi\u1ec7n t\u00edch c\u1ee7a c\u1ea3 mi\u1ebfng \u0111\u1ea5t h\u00ecnh ch\u1eef nh\u1eadt l\u00e0 $x(2x+10) = 2x^2 + 10x$ (m\u00b2).\\n\\nDi\u1ec7n t\u00edch ph\u1ea7n \u0111\u1ea5t c\u00f2n l\u1ea1i \u0111\u1ec3 tr\u1ed3ng hoa l\u00e0:\\n$$2x^2 + 10x - 2x = 2x^2 + 8x \\\\text{ (m}^2\\\\text{)}$$\\n\\nV\u00ec hai mi\u1ebfng \u0111\u1ea5t tr\u1ed3ng hoa c\u00f3 di\u1ec7n t\u00edch b\u1eb1ng nhau n\u00ean di\u1ec7n t\u00edch tr\u1ed3ng hoa h\u1ed3ng l\u00e0:\\n$$A = \\\\dfrac{2x^2 + 8x}{2} = x^2 + 4x$$\\n\\nV\u1eady bi\u1ec3u th\u1ee9c c\u1ea7n t\u00ecm l\u00e0 $\\\\boxed{A = x^2 + 4x}$.\\n\\n**C\u00e2u b) T\u00ednh chi ph\u00ed:**\\n\\nTheo \u0111\u1ec1 b\u00e0i, di\u1ec7n t\u00edch tr\u1ed3ng hoa h\u1ed3ng l\u00e0 45 m\u00b2 n\u00ean ta c\u00f3 ph\u01b0\u01a1ng tr\u00ecnh:\\n$$x^2 + 4x = 45$$\\n$$x^2 + 4x - 45 = 0$$\\n\\nGi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh: $x_1 = 5$ (nh\u1eadn v\u00ec $x > 0$); $x_2 = -9$ (lo\u1ea1i).\\n\\nV\u1edbi $x = 5$, di\u1ec7n t\u00edch c\u1ee7a l\u1ed1i \u0111i l\u00e0:\\n$$S = 2 \\\\cdot 5 = 10 \\\\text{ (m}^2\\\\text{)}$$\\n\\nChi ph\u00ed \u0111\u1ec3 l\u00e0m l\u1ed1i \u0111i l\u00e0:\\n$$10 \\\\cdot 120\\\\,000 = \\\\boxed{1\\\\,200\\\\,000 \\\\text{ (\u0111\u1ed3ng)}}$$\",\"co_hinh_ve\":true,\"ghi_chu_hinh\":\"H\u00ecnh ch\u1eef nh\u1eadt c\u00f3 l\u1ed1i \u0111i h\u00ecnh b\u00ecnh h\u00e0nh \u1edf gi\u1eefa, hai b\u00ean tr\u1ed3ng hoa h\u1ed3ng v\u00e0 hoa c\u00fac.\",\"cau_dan\":{\"khoi_dong\":[\"Em kh\u00f4ng h\u00ecnh dung \u0111\u01b0\u1ee3c 'l\u1ed1i \u0111i h\u00ecnh b\u00ecnh h\u00e0nh' trong mi\u1ebfng \u0111\u1ea5t.\",\"Di\u1ec7n t\u00edch tr\u1ed3ng hoa h\u1ed3ng t\u00ednh th\u1ebf n\u00e0o th\u1ea7y?\",\"Em kh\u00f4ng bi\u1ebft b\u1eaft \u0111\u1ea7u c\u00e2u a t\u1eeb \u0111\u00e2u.\"],\"dinh_huong\":[\"Em \u0111\u1ecbnh t\u00ednh DT c\u1ea3 \u0111\u1ea5t - DT l\u1ed1i \u0111i r\u1ed3i chia 2 \u2014 \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\",\"C\u00e2u b em \u0111\u1ecbnh cho x\u00b2 + 4x = 45 \u2014 \u0111\u00fang kh\u00f4ng?\",\"\u0110i\u1ec1u ki\u1ec7n x > 0 c\u00f3 quan tr\u1ecdng trong c\u00e2u b kh\u00f4ng?\"],\"kiem_tra\":[\"Em ra A = x\u00b2 + 4x \u2014 bi\u1ec3u th\u1ee9c n\u00e0y c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"Em gi\u1ea3i x\u00b2 + 4x - 45 = 0 ra x = 5 v\u00e0 x = -9 \u2014 \u0111\u00fang ch\u01b0a?\",\"Chi ph\u00ed em t\u00ednh 1 200 000 \u0111\u1ed3ng \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\"],\"go_bi\":[\"Em kh\u00f4ng bi\u1ebft di\u1ec7n t\u00edch l\u1ed1i \u0111i h\u00ecnh b\u00ecnh h\u00e0nh l\u00e0 2x.\",\"Em gi\u1ea3i ph\u01b0\u01a1ng tr\u00ecnh x\u00b2 + 4x - 45 = 0 b\u1ecb sai.\",\"Em kh\u00f4ng bi\u1ebft lo\u1ea1i nghi\u1ec7m x = -9 nh\u01b0 th\u1ebf n\u00e0o.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]},\"hinh_anh\":\"/images/de-1/bai4-miengdat.png\"},{\"bai_so\":5,\"diem\":1.0,\"chu_de\":\"H\u00ecnh h\u1ecdc kh\u00f4ng gian - H\u00ecnh tr\u1ee5 v\u00e0 h\u00ecnh h\u1ed9p\",\"de_bai\":\"Trong h\u00ecnh v\u1ebd, 6 lon n\u01b0\u1edbc ng\u1ecdt h\u00ecnh tr\u1ee5 \u0111\u01b0\u1ee3c \u0111\u1eb7t s\u00e1t nhau trong th\u00f9ng carton c\u00f3 d\u1ea1ng h\u00ecnh h\u1ed9p ch\u1eef nh\u1eadt. M\u1ed7i lon c\u00f3 \u0111\u01b0\u1eddng k\u00ednh 7 cm v\u00e0 chi\u1ec1u cao 11 cm.\\n\\na) T\u00ednh th\u1ec3 t\u00edch th\u00f9ng carton.\\n\\nb) T\u00ednh th\u1ec3 t\u00edch ph\u1ea7n c\u00f2n tr\u1ed1ng trong th\u00f9ng carton khi \u0111\u1ef1ng 6 lon n\u01b0\u1edbc ng\u1ecdt. (C\u00e1c k\u1ebft qu\u1ea3 l\u00e0m tr\u00f2n \u0111\u1ebfn h\u00e0ng \u0111\u01a1n v\u1ecb.) Bi\u1ebft c\u00f4ng th\u1ee9c t\u00ednh th\u1ec3 t\u00edch kh\u1ed1i tr\u1ee5 l\u00e0 $V = \\\\pi R^2 h$ ($R$ l\u00e0 b\u00e1n k\u00ednh \u0111\u00e1y, $h$ l\u00e0 chi\u1ec1u cao).\",\"phuong_phap_duoc_dung\":[\"T\u00ednh th\u1ec3 t\u00edch h\u00ecnh h\u1ed9p ch\u1eef nh\u1eadt V = D \u00d7 R \u00d7 C\",\"T\u00ednh th\u1ec3 t\u00edch h\u00ecnh tr\u1ee5 V = \u03c0R\u00b2h\",\"T\u00ednh th\u1ec3 t\u00edch ph\u1ea7n tr\u1ed1ng = th\u1ec3 t\u00edch th\u00f9ng - t\u1ed5ng th\u1ec3 t\u00edch c\u00e1c lon\"],\"kien_thuc_lien_quan\":[\"Th\u1ec3 t\u00edch h\u00ecnh h\u1ed9p ch\u1eef nh\u1eadt\",\"Th\u1ec3 t\u00edch h\u00ecnh tr\u1ee5\",\"Quan h\u1ec7 gi\u1eefa \u0111\u01b0\u1eddng k\u00ednh v\u00e0 b\u00e1n k\u00ednh\"],\"dap_so\":\"a) $V_{th\u00f9ng} = 3234$ cm\u00b3. b) Th\u1ec3 t\u00edch ph\u1ea7n c\u00f2n tr\u1ed1ng \u2248 $694$ cm\u00b3.\",\"goi_y_cap_1\":\"C\u00e2u a: 6 lon x\u1ebfp 2 h\u00e0ng \u00d7 3 lon. Em h\u00e3y t\u00ednh chi\u1ec1u d\u00e0i, chi\u1ec1u r\u1ed9ng th\u00f9ng d\u1ef1a theo \u0111\u01b0\u1eddng k\u00ednh lon. Chi\u1ec1u cao th\u00f9ng = chi\u1ec1u cao lon.\\n\\nC\u00e2u b: T\u00ednh th\u1ec3 t\u00edch 1 lon, r\u1ed3i nh\u00e2n 6. L\u1ea5y th\u1ec3 t\u00edch th\u00f9ng tr\u1eeb \u0111i.\",\"goi_y_cap_2\":\"C\u00e2u a:\\n- Th\u00f9ng ch\u1ee9a 6 lon x\u1ebfp 2 h\u00e0ng, m\u1ed7i h\u00e0ng 3 lon\\n- Chi\u1ec1u d\u00e0i th\u00f9ng = 3 \u00d7 \u0111\u01b0\u1eddng k\u00ednh lon = 3 \u00d7 7 = 21 cm\\n- Chi\u1ec1u r\u1ed9ng th\u00f9ng = 2 \u00d7 7 = 14 cm\\n- Chi\u1ec1u cao th\u00f9ng = chi\u1ec1u cao lon = 11 cm\\n- Th\u1ec3 t\u00edch th\u00f9ng = 21 \u00d7 14 \u00d7 11 = 3234 cm\u00b3\\n\\nC\u00e2u b:\\n- B\u00e1n k\u00ednh \u0111\u00e1y lon R = 7/2 = 3,5 cm\\n- Th\u1ec3 t\u00edch 1 lon = \u03c0 \u00d7 3,5\u00b2 \u00d7 11 = 134,75\u03c0 cm\u00b3\\n- T\u1ed5ng th\u1ec3 t\u00edch 6 lon = 6 \u00d7 134,75\u03c0 = 808,5\u03c0 cm\u00b3\\n- Th\u1ec3 t\u00edch c\u00f2n tr\u1ed1ng = 3234 - 808,5\u03c0 \u2248 694 cm\u00b3\",\"loi_giai_day_du\":\"**C\u00e2u a) Th\u1ec3 t\u00edch th\u00f9ng carton:**\\n\\nV\u00ec th\u00f9ng carton \u0111\u1ef1ng v\u1eeba kh\u00edt 6 lon n\u01b0\u1edbc ng\u1ecdt (x\u1ebfp th\u00e0nh 2 h\u00e0ng, m\u1ed7i h\u00e0ng 3 lon ho\u1eb7c ng\u01b0\u1ee3c l\u1ea1i) n\u00ean k\u00edch th\u01b0\u1edbc c\u1ee7a th\u00f9ng l\u00e0:\\n- Chi\u1ec1u d\u00e0i c\u1ee7a th\u00f9ng l\u00e0: $7 \\\\cdot 3 = 21$ (cm)\\n- Chi\u1ec1u r\u1ed9ng c\u1ee7a th\u00f9ng l\u00e0: $7 \\\\cdot 2 = 14$ (cm)\\n- Chi\u1ec1u cao c\u1ee7a th\u00f9ng b\u1eb1ng chi\u1ec1u cao c\u1ee7a lon n\u01b0\u1edbc: $11$ (cm)\\n\\nTh\u1ec3 t\u00edch th\u00f9ng carton l\u00e0:\\n$$V_{\\\\text{th\u00f9ng}} = 21 \\\\cdot 14 \\\\cdot 11 = 3234 \\\\text{ (cm}^3\\\\text{)}$$\\n\\nV\u1eady th\u1ec3 t\u00edch th\u00f9ng carton l\u00e0 $\\\\boxed{3234 \\\\text{ cm}^3}$.\\n\\n**C\u00e2u b) Th\u1ec3 t\u00edch ph\u1ea7n c\u00f2n tr\u1ed1ng:**\\n\\nB\u00e1n k\u00ednh \u0111\u00e1y c\u1ee7a m\u1ed9t lon n\u01b0\u1edbc ng\u1ecdt l\u00e0:\\n$$R = \\\\dfrac{7}{2} = 3{,}5 \\\\text{ (cm)}$$\\n\\nTh\u1ec3 t\u00edch c\u1ee7a m\u1ed9t lon n\u01b0\u1edbc ng\u1ecdt l\u00e0:\\n$$V_{\\\\text{lon}} = \\\\pi R^2 h = \\\\pi \\\\cdot 3{,}5^2 \\\\cdot 11 = 134{,}75\\\\pi \\\\text{ cm}^3$$\\n\\nT\u1ed5ng th\u1ec3 t\u00edch c\u1ee7a 6 lon n\u01b0\u1edbc ng\u1ecdt l\u00e0:\\n$$V_{6\\\\text{ lon}} = 6 \\\\cdot 134{,}75\\\\pi = 808{,}5\\\\pi \\\\text{ cm}^3$$\\n\\nTh\u1ec3 t\u00edch ph\u1ea7n c\u00f2n tr\u1ed1ng trong th\u00f9ng carton l\u00e0:\\n$$V_{\\\\text{tr\u1ed1ng}} = V_{\\\\text{th\u00f9ng}} - V_{6\\\\text{ lon}} = 3234 - 808{,}5\\\\pi \\\\approx \\\\boxed{694 \\\\text{ cm}^3}$$\",\"co_hinh_ve\":true,\"ghi_chu_hinh\":\"H\u00ecnh 6 lon n\u01b0\u1edbc ng\u1ecdt x\u1ebfp trong th\u00f9ng carton (2 h\u00e0ng \u00d7 3 lon).\",\"cau_dan\":{\"khoi_dong\":[\"6 lon x\u1ebfp trong th\u00f9ng th\u00ec k\u00edch th\u01b0\u1edbc th\u00f9ng th\u1ebf n\u00e0o th\u1ea7y?\",\"C\u00f4ng th\u1ee9c th\u1ec3 t\u00edch h\u00ecnh tr\u1ee5 V = \u03c0R\u00b2h em qu\u00ean r\u1ed3i.\",\"Em kh\u00f4ng bi\u1ebft b\u1eaft \u0111\u1ea7u c\u00e2u a t\u1eeb \u0111\u00e2u.\"],\"dinh_huong\":[\"Em ngh\u0129 6 lon x\u1ebfp 2 h\u00e0ng \u00d7 3 lon \u2014 \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\",\"Th\u1ec3 t\u00edch th\u00f9ng = d\u00e0i \u00d7 r\u1ed9ng \u00d7 cao \u2014 em \u0111\u1ecbnh t\u00ednh v\u1eady \u0111\u00fang ch\u01b0a?\",\"C\u00e2u b em \u0111\u1ecbnh l\u1ea5y V th\u00f9ng - V c\u1ee7a 6 lon \u2014 \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\"],\"kiem_tra\":[\"Em ra V th\u00f9ng = 3234 cm\u00b3 \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"Em t\u00ednh V 1 lon = 134,75\u03c0 cm\u00b3 \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"Em ra V tr\u1ed1ng \u2248 694 cm\u00b3 \u2014 \u0111\u00e1p \u00e1n c\u00f3 \u0111\u00fang kh\u00f4ng?\"],\"go_bi\":[\"Em kh\u00f4ng bi\u1ebft t\u00ednh chi\u1ec1u d\u00e0i/r\u1ed9ng th\u00f9ng t\u1eeb \u0111\u01b0\u1eddng k\u00ednh lon.\",\"Em kh\u00f4ng bi\u1ebft R = \u0111\u01b0\u1eddng k\u00ednh / 2 = 3,5 cm.\",\"Em ra \u03c0 qu\u00e1 l\u1edbn hay qu\u00e1 nh\u1ecf \u2014 t\u00ednh th\u1ec3 t\u00edch b\u1ecb sai.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]},\"hinh_anh\":\"/images/de-1/bai5-lonuocngot.png\"},{\"bai_so\":6,\"diem\":1.0,\"chu_de\":\"H\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc nh\u1ea5t hai \u1ea9n - To\u00e1n th\u1ef1c t\u1ebf\",\"de_bai\":\"\u0110\u1ec3 \u0111\u1ea3m b\u1ea3o dinh d\u01b0\u1ee1ng trong b\u1eefa \u0103n h\u1eb1ng ng\u00e0y th\u00ec m\u1ed7i gia \u0111\u00ecnh 4 th\u00e0nh vi\u00ean c\u1ea7n 900 \u0111\u01a1n v\u1ecb protein v\u00e0 400 \u0111\u01a1n v\u1ecb Lipit trong th\u1ee9c \u0103n h\u1eb1ng ng\u00e0y. M\u1ed7i kil\u00f4gam th\u1ecbt b\u00f2 ch\u1ee9a 800 \u0111\u01a1n v\u1ecb protein v\u00e0 200 \u0111\u01a1n v\u1ecb Lipit, c\u00f2n m\u1ed7i kil\u00f4gam th\u1ecbt heo ch\u1ee9a 600 \u0111\u01a1n v\u1ecb protein v\u00e0 400 \u0111\u01a1n v\u1ecb Lipit. Bi\u1ebft gi\u00e1 th\u1ecbt b\u00f2 l\u00e0 100 000 \u0111\u1ed3ng/kg v\u00e0 th\u1ecbt heo l\u00e0 70 000 \u0111\u1ed3ng/kg. T\u00ednh t\u1ed5ng s\u1ed1 ti\u1ec1n mua th\u1ecbt b\u00f2 v\u00e0 th\u1ecbt heo \u0111\u1ec3 \u0111\u1ea3m b\u1ea3o dinh d\u01b0\u1ee1ng h\u1eb1ng ng\u00e0y cho 4 ng\u01b0\u1eddi?\",\"phuong_phap_duoc_dung\":[\"\u0110\u1eb7t \u1ea9n ph\u1ee5 cho \u0111\u1ea1i l\u01b0\u1ee3ng c\u1ea7n t\u00ecm\",\"L\u1eadp h\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc nh\u1ea5t 2 \u1ea9n t\u1eeb c\u00e1c \u0111i\u1ec1u ki\u1ec7n\",\"Gi\u1ea3i h\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh\"],\"kien_thuc_lien_quan\":[\"H\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh b\u1eadc nh\u1ea5t hai \u1ea9n\",\"Ph\u01b0\u01a1ng ph\u00e1p c\u1ed9ng \u0111\u1ea1i s\u1ed1 / ph\u01b0\u01a1ng ph\u00e1p th\u1ebf\"],\"dap_so\":\"T\u1ed5ng s\u1ed1 ti\u1ec1n: 109 000 \u0111\u1ed3ng.\",\"goi_y_cap_1\":\"G\u1ecdi x (kg) l\u00e0 l\u01b0\u1ee3ng th\u1ecbt b\u00f2, y (kg) l\u00e0 l\u01b0\u1ee3ng th\u1ecbt heo (x, y > 0). L\u1eadp 2 ph\u01b0\u01a1ng tr\u00ecnh: 1 cho protein, 1 cho Lipit. Gi\u1ea3i h\u1ec7 r\u1ed3i t\u00ednh ti\u1ec1n.\",\"goi_y_cap_2\":\"- G\u1ecdi $x$ (kg) l\u00e0 kh\u1ed1i l\u01b0\u1ee3ng th\u1ecbt b\u00f2, $y$ (kg) l\u00e0 th\u1ecbt heo ($x, y > 0$)\\n- Protein: $800x + 600y = 900$\\n- Lipit: $200x + 400y = 400$\\n- Gi\u1ea3i h\u1ec7: $x = 0{,}6$; $y = 0{,}7$\\n- Ti\u1ec1n = $100\\\\,000 \\\\cdot 0{,}6 + 70\\\\,000 \\\\cdot 0{,}7 = 109\\\\,000$ \u0111\u1ed3ng\",\"loi_giai_day_du\":\"G\u1ecdi $x$ (kg) l\u00e0 kh\u1ed1i l\u01b0\u1ee3ng th\u1ecbt b\u00f2 c\u1ea7n mua, $y$ (kg) l\u00e0 kh\u1ed1i l\u01b0\u1ee3ng th\u1ecbt heo c\u1ea7n mua ($x, y > 0$).\\n\\nV\u00ec t\u1ed5ng l\u01b0\u1ee3ng protein c\u1ea7n thi\u1ebft cho gia \u0111\u00ecnh l\u00e0 900 \u0111\u01a1n v\u1ecb n\u00ean ta c\u00f3 ph\u01b0\u01a1ng tr\u00ecnh:\\n$$800x + 600y = 900 \\\\quad (1)$$\\n\\nV\u00ec t\u1ed5ng l\u01b0\u1ee3ng Lipit c\u1ea7n thi\u1ebft cho gia \u0111\u00ecnh l\u00e0 400 \u0111\u01a1n v\u1ecb n\u00ean ta c\u00f3 ph\u01b0\u01a1ng tr\u00ecnh:\\n$$200x + 400y = 400 \\\\quad (2)$$\\n\\nT\u1eeb (1) v\u00e0 (2) ta c\u00f3 h\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh:\\n$$\\\\begin{cases} 800x + 600y = 900 \\\\\\\\ 200x + 400y = 400 \\\\end{cases} \\\\Rightarrow \\\\begin{cases} x = 0{,}6 \\\\\\\\ y = 0{,}7 \\\\end{cases}$$\\n\\nT\u1ed5ng s\u1ed1 ti\u1ec1n c\u1ea7n \u0111\u1ec3 mua th\u1ecbt b\u00f2 v\u00e0 th\u1ecbt heo l\u00e0:\\n$$100\\\\,000 \\\\cdot 0{,}6 + 70\\\\,000 \\\\cdot 0{,}7 = 109\\\\,000 \\\\text{ (\u0111\u1ed3ng)}$$\\n\\nV\u1eady t\u1ed5ng s\u1ed1 ti\u1ec1n c\u1ea7n mua l\u00e0 $\\\\boxed{109\\\\,000 \\\\text{ \u0111\u1ed3ng}}$.\",\"co_hinh_ve\":false,\"cau_dan\":{\"khoi_dong\":[\"Em kh\u00f4ng bi\u1ebft \u0111\u1eb7t \u1ea9n cho b\u00e0i to\u00e1n n\u00e0y.\",\"Em kh\u00f4ng hi\u1ec3u '\u0111\u01a1n v\u1ecb protein', '\u0111\u01a1n v\u1ecb Lipit' l\u00e0 g\u00ec.\",\"L\u1eadp h\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh t\u1eeb b\u00e0i to\u00e1n th\u1ebf n\u00e0o th\u1ea7y?\"],\"dinh_huong\":[\"Em \u0111\u1ecbnh g\u1ecdi x l\u00e0 th\u1ecbt b\u00f2, y l\u00e0 th\u1ecbt heo \u2014 \u0111\u00fang kh\u00f4ng?\",\"Em l\u1eadp 2 ph\u01b0\u01a1ng tr\u00ecnh: 1 cho protein, 1 cho Lipit \u2014 \u0111\u00fang h\u01b0\u1edbng ch\u1ee9?\",\"Em \u0111\u1ecbnh d\u00f9ng ph\u01b0\u01a1ng ph\u00e1p c\u1ed9ng \u0111\u1ea1i s\u1ed1 \u0111\u1ec3 gi\u1ea3i h\u1ec7 \u2014 c\u00f3 \u1ed5n kh\u00f4ng?\"],\"kiem_tra\":[\"Em l\u1eadp \u0111\u01b0\u1ee3c h\u1ec7 800x + 600y = 900 v\u00e0 200x + 400y = 400 \u2014 \u0111\u00fang ch\u01b0a?\",\"Em ra x = 0,6 v\u00e0 y = 0,7 \u2014 \u0111\u00e1p \u00e1n c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"T\u1ed5ng ti\u1ec1n em t\u00ednh 109 000 \u0111\u1ed3ng \u2014 c\u00f3 ch\u00ednh x\u00e1c kh\u00f4ng?\"],\"go_bi\":[\"Em gi\u1ea3i h\u1ec7 ph\u01b0\u01a1ng tr\u00ecnh ra x, y sai.\",\"Em nh\u00e2n nh\u1ea7m 100 000 \u00d7 0,6 + 70 000 \u00d7 0,7.\",\"Em kh\u00f4ng bi\u1ebft b\u1eaft \u0111\u1ea7u l\u1eadp ph\u01b0\u01a1ng tr\u00ecnh t\u1eeb \u0111\u00e2u.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]}},{\"bai_so\":7,\"diem\":3.0,\"chu_de\":\"H\u00ecnh h\u1ecdc - \u0110\u01b0\u1eddng tr\u00f2n v\u00e0 ti\u1ebfp tuy\u1ebfn\",\"de_bai\":\"T\u1eeb \u0111i\u1ec3m $A$ n\u1eb1m ngo\u00e0i \u0111\u01b0\u1eddng tr\u00f2n $(O; R)$ v\u1ebd hai ti\u1ebfp tuy\u1ebfn $AB, AC$ ($B, C$ l\u00e0 ti\u1ebfp \u0111i\u1ec3m). V\u1ebd \u0111\u01b0\u1eddng k\u00ednh $BD$ c\u1ee7a \u0111\u01b0\u1eddng tr\u00f2n $(O)$. G\u1ecdi $K$ l\u00e0 h\u00ecnh chi\u1ebfu c\u1ee7a $C$ tr\u00ean $BD$, $CK$ c\u1eaft $AD$ t\u1ea1i $I$. G\u1ecdi $H$ l\u00e0 giao \u0111i\u1ec3m c\u1ee7a $OA$ v\u00e0 $BC$.\\n\\na) Ch\u1ee9ng minh: T\u1ee9 gi\u00e1c $ABOC$ n\u1ed9i ti\u1ebfp v\u00e0 $AO \\\\perp BC$.\\n\\nb) Ch\u1ee9ng minh: $I$ l\u00e0 trung \u0111i\u1ec3m c\u1ee7a $CK$.\\n\\nc) \u0110\u01b0\u1eddng th\u1eb3ng $BD$ v\u00e0 \u0111\u01b0\u1eddng th\u1eb3ng $AC$ c\u1eaft nhau t\u1ea1i $S$. Tia $SI$ c\u1eaft $AB$ t\u1ea1i $M$. Gi\u1ea3 s\u1eed $OA = 2R$. H\u00e3y t\u00ednh di\u1ec7n t\u00edch c\u1ee7a t\u1ee9 gi\u00e1c $AMOC$ theo $R$.\",\"phuong_phap_duoc_dung\":[\"T\u1ee9 gi\u00e1c n\u1ed9i ti\u1ebfp (4 \u0111i\u1ec3m c\u00f9ng n\u1eb1m tr\u00ean \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh)\",\"T\u00ednh ch\u1ea5t 2 ti\u1ebfp tuy\u1ebfn c\u1eaft nhau\",\"H\u1ec7 qu\u1ea3 \u0111\u1ecbnh l\u00fd Thales\",\"Tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng\",\"\u0110\u1ecbnh l\u00fd Pythagore\"],\"kien_thuc_lien_quan\":[\"Ti\u1ebfp tuy\u1ebfn c\u1ee7a \u0111\u01b0\u1eddng tr\u00f2n vu\u00f4ng g\u00f3c v\u1edbi b\u00e1n k\u00ednh t\u1ea1i ti\u1ebfp \u0111i\u1ec3m\",\"G\u00f3c n\u1ed9i ti\u1ebfp ch\u1eafn n\u1eeda \u0111\u01b0\u1eddng tr\u00f2n l\u00e0 g\u00f3c vu\u00f4ng\",\"T\u00ednh ch\u1ea5t 2 ti\u1ebfp tuy\u1ebfn: AB = AC, OA l\u00e0 trung tr\u1ef1c BC\",\"\u0110\u1ecbnh l\u00fd Thales, h\u1ec7 qu\u1ea3 Thales\",\"\u0110\u1ecbnh l\u00fd Pythagore\"],\"dap_so\":\"c) $S_{AMOC} = \\\\dfrac{3R^2\\\\sqrt{3}}{4}$\",\"goi_y_cap_1\":\"C\u00e2u a: Ch\u1ee9ng minh 4 \u0111i\u1ec3m A, B, O, C c\u00f9ng n\u1eb1m tr\u00ean \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh AO (d\u00f9ng g\u00f3c vu\u00f4ng 90\u00b0). Ph\u1ea7n AO \u22a5 BC d\u00f9ng t\u00ednh ch\u1ea5t 2 ti\u1ebfp tuy\u1ebfn.\\n\\nC\u00e2u b: Ch\u1ee9ng minh CK // AB, r\u1ed3i d\u00f9ng h\u1ec7 qu\u1ea3 Thales trong tam gi\u00e1c DAB v\u00e0 tam gi\u00e1c \u0111\u1ed3ng d\u1ea1ng DKC ~ OBA \u0111\u1ec3 \u0111\u01b0\u1ee3c IK = (1/2)CK.\\n\\nC\u00e2u c: T\u00ednh AC d\u00f9ng Pythagore (tam gi\u00e1c ACO vu\u00f4ng). D\u00f9ng Thales \u0111\u1ec3 ch\u1ee9ng minh M l\u00e0 trung \u0111i\u1ec3m AB. R\u1ed3i t\u00ednh $S_{ABO}$, $S_{AMO}$, $S_{ACO}$, c\u1ed9ng l\u1ea1i.\",\"goi_y_cap_2\":\"C\u00e2u a:\\n- X\u00e9t tam gi\u00e1c ABO vu\u00f4ng t\u1ea1i B (do AB \u22a5 OB - ti\u1ebfp tuy\u1ebfn) \u2192 ABO n\u1ed9i ti\u1ebfp \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh AO\\n- T\u01b0\u01a1ng t\u1ef1 ACO n\u1ed9i ti\u1ebfp \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh AO\\n- V\u1eady A, B, O, C c\u00f9ng n\u1eb1m tr\u00ean \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh AO \u2192 ABOC n\u1ed9i ti\u1ebfp\\n- AB = AC (2 ti\u1ebfp tuy\u1ebfn), OB = OC = R \u2192 OA l\u00e0 trung tr\u1ef1c BC \u2192 OA \u22a5 BC\\n\\nC\u00e2u b:\\n- AB \u22a5 BD (ti\u1ebfp tuy\u1ebfn t\u1ea1i B), CK \u22a5 BD (gt) \u2192 CK // AB\\n- Tam gi\u00e1c DAB c\u00f3 CK // AB, theo h\u1ec7 qu\u1ea3 Thales: IK/AB = DK/DB = DK/(2R) (3)\\n- G\u00f3c BCD = 90\u00b0 (n\u1ed9i ti\u1ebfp ch\u1eafn n\u1eeda \u0111\u01b0\u1eddng tr\u00f2n) \u2192 BC \u22a5 CD \u2192 CD // OA (v\u00ec OA \u22a5 BC)\\n- Tam gi\u00e1c DKC ~ tam gi\u00e1c OBA (g-g) \u2192 CK/BA = DK/R (4)\\n- T\u1eeb (3) v\u00e0 (4): IK = (1/2)CK\\n\\nC\u00e2u c:\\n- Pythagore trong tam gi\u00e1c ACO vu\u00f4ng t\u1ea1i C: AC\u00b2 = OA\u00b2 - OC\u00b2 = 4R\u00b2 - R\u00b2 = 3R\u00b2 \u2192 AC = R\u221a3\\n- $S_{ACO} = \\\\frac{1}{2} \\\\cdot OC \\\\cdot AC = \\\\frac{R^2\\\\sqrt{3}}{2}$\\n- Ch\u1ee9ng minh M l\u00e0 trung \u0111i\u1ec3m AB (d\u00f9ng Thales 2 l\u1ea7n + IC = IK)\\n- Tam gi\u00e1c ABO vu\u00f4ng t\u1ea1i B: AB = R\u221a3 \u2192 $S_{ABO} = \\\\frac{R^2\\\\sqrt{3}}{2}$\\n- $S_{AMO} = \\\\frac{1}{2} S_{ABO} = \\\\frac{R^2\\\\sqrt{3}}{4}$\\n- $S_{AMOC} = S_{AMO} + S_{ACO} = \\\\frac{R^2\\\\sqrt{3}}{4} + \\\\frac{R^2\\\\sqrt{3}}{2} = \\\\frac{3R^2\\\\sqrt{3}}{4}$\",\"loi_giai_day_du\":\"**C\u00e2u a) T\u1ee9 gi\u00e1c ABOC n\u1ed9i ti\u1ebfp v\u00e0 AO \u22a5 BC:**\\n\\n- X\u00e9t $\\\\triangle ABO$ vu\u00f4ng t\u1ea1i $B$ (do $AB \\\\perp OB$).\\n\\nSuy ra $\\\\triangle ABO$ n\u1ed9i ti\u1ebfp \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh $AO$ (1).\\n\\n- X\u00e9t $\\\\triangle ACO$ vu\u00f4ng t\u1ea1i $C$ (do $AC \\\\perp OC$).\\n\\nSuy ra $\\\\triangle ACO$ n\u1ed9i ti\u1ebfp \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh $AO$ (2).\\n\\nT\u1eeb (1) v\u00e0 (2) suy ra 4 \u0111i\u1ec3m $A, B, O, C$ c\u00f9ng thu\u1ed9c m\u1ed9t \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh $AO$.\\n\\nSuy ra **t\u1ee9 gi\u00e1c ABOC n\u1ed9i ti\u1ebfp**.\\n\\nTa c\u00f3:\\n$$\\\\begin{cases} AB = AC \\\\text{ (t\u00ednh ch\u1ea5t 2 ti\u1ebfp tuy\u1ebfn c\u1eaft nhau)} \\\\\\\\ OB = OC = R \\\\end{cases}$$\\n$\\\\Rightarrow OA$ l\u00e0 trung tr\u1ef1c c\u1ee7a $BC$ $\\\\Rightarrow$ **$OA \\\\perp BC$ t\u1ea1i $H$**. \u25a1\\n\\n**C\u00e2u b) I l\u00e0 trung \u0111i\u1ec3m c\u1ee7a CK:**\\n\\nTa c\u00f3 $AB \\\\perp BD$ ($AB$ l\u00e0 ti\u1ebfp tuy\u1ebfn t\u1ea1i $B$ c\u1ee7a \u0111\u01b0\u1eddng k\u00ednh $BD$).\\n\\nM\u00e0 $CK \\\\perp BD$ (gi\u1ea3 thi\u1ebft).\\n\\n$\\\\Rightarrow CK \\\\parallel AB$.\\n\\nX\u00e9t $\\\\triangle DAB$ c\u00f3 $CK \\\\parallel AB$. Theo h\u1ec7 qu\u1ea3 \u0111\u1ecbnh l\u00fd Thales:\\n$$\\\\dfrac{IK}{AB} = \\\\dfrac{DK}{DB} = \\\\dfrac{DK}{2R} \\\\quad (3)$$\\n\\n$\\\\widehat{BCD} = 90\u00b0$ (g\u00f3c n\u1ed9i ti\u1ebfp ch\u1eafn n\u1eeda \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh $BD$)\\n\\n$\\\\Rightarrow BC \\\\perp CD$ v\u00e0 $OA \\\\perp BC$\\n\\n$\\\\Rightarrow OA \\\\parallel CD$.\\n\\nX\u00e9t $\\\\triangle DKC$ v\u00e0 $\\\\triangle OBA$ c\u00f3:\\n$$\\\\begin{cases} \\\\widehat{CKD} = \\\\widehat{OBA} = 90\u00b0 \\\\\\\\ \\\\widehat{KDC} = \\\\widehat{BOA} \\\\text{ (2 g\u00f3c \u0111\u1ed3ng v\u1ecb)} \\\\end{cases}$$\\n$\\\\Rightarrow \\\\triangle DKC \\\\sim \\\\triangle OBA$ (g-g)\\n$\\\\Rightarrow \\\\dfrac{CK}{BA} = \\\\dfrac{DK}{BO} = \\\\dfrac{DK}{R} \\\\quad (4)$\\n\\nT\u1eeb (3) v\u00e0 (4) suy ra $IK = \\\\dfrac{1}{2}CK$.\\n\\nV\u1eady **$I$ l\u00e0 trung \u0111i\u1ec3m c\u1ee7a $CK$**. \u25a1\\n\\n**C\u00e2u c) T\u00ednh di\u1ec7n t\u00edch t\u1ee9 gi\u00e1c AMOC theo R:**\\n\\nX\u00e9t $\\\\triangle ACO$ vu\u00f4ng t\u1ea1i $C$ (\u0111\u1ecbnh l\u00fd Pythagore):\\n$$AC^2 + OC^2 = OA^2 \\\\Rightarrow AC^2 + R^2 = (2R)^2 \\\\Rightarrow AC^2 = 3R^2 \\\\Rightarrow AC = R\\\\sqrt{3}$$\\n\\nDi\u1ec7n t\u00edch $\\\\triangle ACO$ l\u00e0:\\n$$S_{ACO} = \\\\dfrac{1}{2} \\\\cdot OC \\\\cdot AC = \\\\dfrac{1}{2} \\\\cdot R \\\\cdot R\\\\sqrt{3} = \\\\dfrac{R^2\\\\sqrt{3}}{2}$$\\n\\nV\u00ec $CK \\\\parallel AB$ (cmt), theo \u0111\u1ecbnh l\u00fd Thales:\\n- $\\\\dfrac{IC}{MA} = \\\\dfrac{SI}{SM}$ (\u00e1p d\u1ee5ng cho $\\\\triangle SMA$ v\u00e0 $\\\\triangle SIC$)\\n- $\\\\dfrac{IK}{MB} = \\\\dfrac{SI}{SM}$ (\u00e1p d\u1ee5ng cho $\\\\triangle SMB$ v\u00e0 $\\\\triangle SIK$)\\n\\nSuy ra $\\\\dfrac{IC}{MA} = \\\\dfrac{IK}{MB}$.\\n\\nM\u00e0 $IC = IK$ (cmt) n\u00ean $MA = MB$.\\n\\nSuy ra $M$ l\u00e0 trung \u0111i\u1ec3m c\u1ee7a $AB$.\\n\\n$\\\\triangle ABO$ vu\u00f4ng t\u1ea1i $B$: $AB^2 + OB^2 = OA^2 \\\\Rightarrow AB^2 = (2R)^2 - R^2 = 3R^2 \\\\Rightarrow AB = R\\\\sqrt{3}$.\\n\\nDi\u1ec7n t\u00edch $\\\\triangle ABO$:\\n$$S_{ABO} = \\\\dfrac{1}{2} \\\\cdot OB \\\\cdot AB = \\\\dfrac{R^2\\\\sqrt{3}}{2}$$\\n\\nV\u00ec $M$ l\u00e0 trung \u0111i\u1ec3m $AB$: $S_{AMO} = \\\\dfrac{1}{2} S_{ABO} = \\\\dfrac{R^2\\\\sqrt{3}}{4}$.\\n\\nDi\u1ec7n t\u00edch t\u1ee9 gi\u00e1c $AMOC$:\\n$$S_{AMOC} = S_{AMO} + S_{ACO} = \\\\dfrac{R^2\\\\sqrt{3}}{4} + \\\\dfrac{R^2\\\\sqrt{3}}{2} = \\\\boxed{\\\\dfrac{3R^2\\\\sqrt{3}}{4}}$$\",\"co_hinh_ve\":true,\"ghi_chu_hinh\":\"H\u00ecnh v\u1ebd \u0111\u01b0\u1eddng tr\u00f2n (O;R) v\u1edbi ti\u1ebfp tuy\u1ebfn AB, AC; \u0111\u01b0\u1eddng k\u00ednh BD; c\u00e1c \u0111i\u1ec3m K, I, H, M, S.\",\"cau_dan\":{\"khoi_dong\":[\"Em ch\u01b0a hi\u1ec3u \u0111\u1ec1 l\u1eafm \u2014 'h\u00ecnh chi\u1ebfu c\u1ee7a C tr\u00ean BD' l\u00e0 g\u00ec?\",\"Em c\u1ea7n nh\u1eafc ki\u1ebfn th\u1ee9c v\u1ec1 ti\u1ebfp tuy\u1ebfn v\u00e0 t\u1ee9 gi\u00e1c n\u1ed9i ti\u1ebfp.\",\"C\u00e2u a ch\u1ee9ng minh t\u1ee9 gi\u00e1c n\u1ed9i ti\u1ebfp em kh\u00f4ng bi\u1ebft b\u1eaft \u0111\u1ea7u th\u1ebf n\u00e0o.\"],\"dinh_huong\":[\"Em \u0111\u1ecbnh ch\u1ee9ng minh 4 \u0111i\u1ec3m A, B, O, C c\u00f9ng thu\u1ed9c \u0111\u01b0\u1eddng tr\u00f2n \u0111\u01b0\u1eddng k\u00ednh AO \u2014 \u0111\u00fang h\u01b0\u1edbng ch\u1ee9?\",\"C\u00e2u b em \u0111\u1ecbnh ch\u1ee9ng minh CK // AB r\u1ed3i d\u00f9ng Thales \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"C\u00e2u c em \u0111\u1ecbnh d\u00f9ng Pythagore cho tam gi\u00e1c ACO \u2014 \u0111\u00fang h\u01b0\u1edbng kh\u00f4ng?\"],\"kiem_tra\":[\"Em ch\u1ee9ng minh AO \u22a5 BC qua t\u00ednh ch\u1ea5t 2 ti\u1ebfp tuy\u1ebfn \u2014 \u0111\u00fang ch\u01b0a?\",\"Em ra IK = (1/2)CK \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\",\"Em ra AC = R\u221a3 v\u00e0 S_AMOC = 3R\u00b2\u221a3/4 \u2014 c\u00f3 \u0111\u00fang kh\u00f4ng?\"],\"go_bi\":[\"Em kh\u00f4ng ch\u1ee9ng minh \u0111\u01b0\u1ee3c CK // AB.\",\"Em kh\u00f4ng bi\u1ebft \u00e1p d\u1ee5ng \u0111\u1ecbnh l\u00fd Thales v\u00e0o 2 tam gi\u00e1c n\u00e0o.\",\"Em kh\u00f4ng bi\u1ebft M l\u00e0 trung \u0111i\u1ec3m c\u1ee7a AB.\"],\"loi_giai\":[\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 1 (h\u01b0\u1edbng l\u00e0m).\",\"\ud83d\udcce Xem g\u1ee3i \u00fd c\u1ea5p 2 (c\u00e1c b\u01b0\u1edbc ch\u00ednh).\",\"\ud83d\udcce Xem l\u1eddi gi\u1ea3i \u0111\u1ea7y \u0111\u1ee7.\"]},\"hinh_anh\":\"/images/de-1/bai7-duongtron.png\"}]}");

function getCauDanItems(groupId) {
  const bai = CURRENT_DE_DATA.bai.find(b => b.bai_so === currentBai);
  const group = CAU_DAN_GROUPS.find(g => g.id === groupId);

// ============ STATE ============
let currentDe = 1;
let currentBai = 1;
let openGroups = new Set(); // nhiều nhóm có thể mở cùng lúc
let chatHistory = [];
let selectedImage = null;

// ============ DRAWER CHỌN ĐỀ + MOBILE ============
function openDeDrawer() {
  // Trên điện thoại: đóng panel danh sách bài trước, rồi mở drawer chọn đề.
  // Nếu để 2 panel chồng nhau cùng lúc, drawer chọn đề có thể bị panel trái che mất.
  document.getElementById('colLeft').classList.remove('mobile-show');
  document.getElementById('colRight').classList.remove('mobile-show');
  document.getElementById('deDrawer').classList.add('open');
  updateOverlay();
}
function closeDeDrawer() {
  document.getElementById('deDrawer').classList.remove('open');
  updateOverlay();
}

// Đóng TẤT CẢ drawer (cả desktop drawer và mobile cột)
function closeAllMobileDrawers() {
  document.getElementById('deDrawer').classList.remove('open');
  document.getElementById('colLeft').classList.remove('mobile-show');
  document.getElementById('colRight').classList.remove('mobile-show');
  updateOverlay();
}

// Hiện/ẩn overlay tùy có drawer nào đang mở
function updateOverlay() {
  const anyOpen = document.getElementById('deDrawer').classList.contains('open')
    || document.getElementById('colLeft').classList.contains('mobile-show')
    || document.getElementById('colRight').classList.contains('mobile-show');
  document.getElementById('overlay').classList.toggle('show', anyOpen);
  // Chống scroll body khi drawer mở (UX mượt trên iOS)
  document.body.style.overflow = anyOpen ? 'hidden' : '';
}

// Click overlay → đóng tất cả
document.getElementById('overlay').addEventListener('click', closeAllMobileDrawers);

// ESC key → đóng
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAllMobileDrawers();
});

// Swipe để đóng trên mobile
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  // Chỉ tính swipe ngang (bỏ qua nếu di chuyển dọc nhiều hơn)
  if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx)) return;
  const left = document.getElementById('colLeft').classList.contains('mobile-show');
  const right = document.getElementById('colRight').classList.contains('mobile-show');
  if (left && dx < 0) closeAllMobileDrawers();       // vuốt trái → đóng col-left
  if (right && dx > 0) closeAllMobileDrawers();      // vuốt phải → đóng col-right
}, { passive: true });

// Nút mobile toggle trên header
document.getElementById('btnLeft').onclick = () => {
  const left = document.getElementById('colLeft');
  const wasOpen = left.classList.contains('mobile-show');
  closeAllMobileDrawers();
  if (!wasOpen) {
    left.classList.add('mobile-show');
    updateOverlay();
  }
};
document.getElementById('btnRight').onclick = () => {
  const right = document.getElementById('colRight');
  const wasOpen = right.classList.contains('mobile-show');
  closeAllMobileDrawers();
  if (!wasOpen) {
    right.classList.add('mobile-show');
    updateOverlay();
  }
};

function renderDeDrawer() {
  const el = document.getElementById('deDrawerList');
  el.innerHTML = DE_LIST.map(d => `
    <div class="de-drawer-item ${d.available ? '' : 'locked'} ${d.de_so === currentDe ? 'active' : ''}"
         ${d.available ? `onclick="selectDe(${d.de_so})"` : ''}>
      <div class="de-drawer-num">${d.de_so}</div>
      <div style="flex:1;">
        <div style="font-weight: 600; font-size: 13px;">${d.label}</div>
        <div style="font-size: 11px; color: var(--ink-muted);">${d.meta}</div>
      </div>
    </div>
  `).join('');
}
